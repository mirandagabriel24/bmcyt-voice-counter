<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BMCyt Counter</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e14; --surface:#111720; --surface2:#1a2233; --border:#1e2d45;
  --accent:#00d4ff; --accent2:#7c3aed; --green:#10b981; --yellow:#f59e0b;
  --red:#ef4444; --text:#e2e8f0; --muted:#64748b;
  --mono:'Space Mono',monospace; --sans:'DM Sans',sans-serif;
  --tap:48px; /* minimum tap target */
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:12px 14px;}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;
  padding:10px 0 16px;border-bottom:1px solid var(--border);margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.logo-text h1{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;}
.logo-text p{font-size:9px;color:var(--muted);letter-spacing:.5px;}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.header-stats{display:flex;gap:16px;}
.hstat{text-align:right;}
.hstat-val{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--accent);}
.hstat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}

/* Language toggle */
.lang-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:3px;gap:3px;}
.lang-btn{padding:5px 12px;border-radius:6px;border:none;background:transparent;
  color:var(--muted);font-family:var(--mono);font-size:11px;font-weight:700;
  cursor:pointer;transition:all .2s;letter-spacing:1px;}
.lang-btn.active{background:var(--accent);color:#000;}

/* ── PROGRESS ── */
.progress-section{margin-bottom:14px;}
.progress-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-family:var(--mono);margin-bottom:5px;}
.progress-track{height:7px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .35s ease;}
.milestones{display:flex;gap:4px;margin-top:6px;}
.ms{flex:1;text-align:center;font-size:9px;color:var(--muted);font-family:var(--mono);
  padding:2px;border-radius:3px;border:1px solid transparent;transition:all .3s;}
.ms.reached{color:var(--accent);border-color:var(--accent);background:rgba(0,212,255,.08);}
.ms.active{color:var(--yellow);border-color:var(--yellow);background:rgba(245,158,11,.1);animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* ── DICTATION STRIP — minimal, sticky ── */
.dictation-bar{
  position:sticky;top:0;z-index:100;background:var(--bg);
  padding:8px 0 10px;border-bottom:1px solid var(--border);margin-bottom:14px;
}
.dictation-inner{display:flex;align-items:center;gap:8px;background:var(--surface);
  border:2px solid var(--border);border-radius:12px;padding:8px 12px;transition:border-color .2s;}
.dictation-inner:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.12);}
.dictation-inner.matched{border-color:var(--green);box-shadow:0 0 0 3px rgba(16,185,129,.12);animation:matchGlow .4s ease;}
.dictation-inner.no-match{border-color:var(--red);box-shadow:0 0 0 3px rgba(239,68,68,.12);}
@keyframes matchGlow{0%{background:var(--surface)}40%{background:rgba(16,185,129,.1)}100%{background:var(--surface)}}
.mic-icon{font-size:18px;flex-shrink:0;}
.dictation-input{flex:1;background:transparent;border:none;outline:none;
  font-family:var(--sans);font-size:16px;color:var(--text);font-weight:500;min-width:0;caret-color:var(--accent);}
.dictation-input::placeholder{color:var(--muted);font-size:13px;}
.dictation-status{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0;}
.dictation-status.ok{color:var(--green);}
.dictation-status.err{color:var(--red);}
.btn-clear-dict{background:transparent;border:none;color:var(--muted);font-size:18px;
  cursor:pointer;flex-shrink:0;padding:2px 4px;line-height:1;min-width:var(--tap);display:flex;align-items:center;justify-content:center;}
.btn-clear-dict:active{color:var(--red);}

/* ── HOW-TO COLLAPSIBLE ── */
.howto-toggle{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;background:transparent;border:none;padding:7px 0 0;
  color:var(--muted);font-family:var(--mono);font-size:10px;cursor:pointer;
  text-transform:uppercase;letter-spacing:1px;
  gap:8px;
}
.howto-toggle:active{color:var(--accent);}
.howto-arrow{transition:transform .25s;font-size:12px;}
.howto-arrow.open{transform:rotate(180deg);}
.howto-body{display:none;margin-top:8px;}
.howto-body.open{display:block;}
.how-to{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:6px;}
.how-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;}
.how-card-title{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.how-card-body{font-size:10px;color:var(--muted);line-height:1.7;}
.how-card-body kbd{background:var(--surface);border:1px solid var(--border);border-radius:4px;
  padding:1px 5px;font-family:var(--mono);font-size:9px;color:var(--text);}
.shortcut-grid{display:grid;grid-template-columns:auto 1fr;gap:3px 10px;margin-top:4px;}
.sk{display:contents;}
.sk span{font-size:10px;color:var(--muted);align-self:center;}

/* ── CHIPS ── */
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.chip{background:var(--surface2);border:1px solid var(--border);border-radius:99px;
  padding:5px 12px;font-size:11px;font-family:var(--mono);color:var(--muted);
  cursor:pointer;transition:all .15s;user-select:none;touch-action:manipulation;
  min-height:var(--tap);display:flex;align-items:center;}
.chip:active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.08);}
.chip.undo{border-color:var(--red);color:var(--red);}
.chip.undo:active{background:rgba(239,68,68,.1);}

/* ── MAIN GRID ── */
.main-grid{display:grid;grid-template-columns:1fr 300px;gap:16px;}

/* ── CELLS GRID ── */
.cells-panel{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.section-label{grid-column:1/-1;font-size:9px;text-transform:uppercase;letter-spacing:2px;
  color:var(--muted);font-family:var(--mono);padding-bottom:4px;border-bottom:1px solid var(--border);margin-top:6px;}

/* ── CELL CARD — desktop ── */
.cell-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:12px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;user-select:none;}
.cell-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--card-color,var(--accent));opacity:0;transition:opacity .2s;}
.cell-card:hover,.cell-card:active{border-color:var(--card-color,var(--accent));transform:translateY(-1px);background:var(--surface2);}
.cell-card:hover::before,.cell-card:active::before{opacity:1;}
.cell-card.flash{animation:cardFlash .25s ease;}
@keyframes cardFlash{0%{transform:scale(1)}45%{transform:scale(.96);background:rgba(255,255,255,.06)}100%{transform:scale(1)}}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:6px;}
.card-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.3;}
.card-shortcut{font-family:var(--mono);font-size:9px;background:var(--surface2);
  border:1px solid var(--border);border-radius:4px;padding:1px 5px;color:var(--muted);flex-shrink:0;}
.card-count{font-family:var(--mono);font-size:38px;font-weight:700;
  color:var(--card-color,var(--accent));line-height:1;margin-bottom:4px;}
.card-tag{display:inline-block;font-size:8px;text-transform:uppercase;letter-spacing:1px;
  padding:2px 7px;border-radius:99px;background:rgba(255,255,255,.05);color:var(--muted);margin-bottom:5px;}
.card-desc{font-size:9px;color:var(--muted);line-height:1.5;}
.card-bar{height:3px;background:var(--surface2);border-radius:99px;margin-top:8px;overflow:hidden;}
.card-bar-fill{height:100%;background:var(--card-color,var(--accent));border-radius:99px;transition:width .3s;opacity:.6;}
.btn-row{display:flex;gap:6px;margin-top:8px;}
.btn-inc,.btn-dec,.btn-rst{flex:1;background:transparent;border:1px solid var(--border);
  color:var(--muted);border-radius:7px;padding:6px 0;font-size:15px;cursor:pointer;
  transition:all .15s;font-family:var(--mono);touch-action:manipulation;min-height:var(--tap);}
.btn-inc:active{background:var(--card-color);color:#000;border-color:var(--card-color);}
.btn-dec:active{background:var(--surface2);color:var(--text);border-color:var(--muted);}
.btn-rst:active{background:rgba(239,68,68,.12);color:var(--red);border-color:var(--red);}

/* ── RIGHT PANEL ── */
.right-panel{display:flex;flex-direction:column;gap:12px;}
.summary-panel{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px;flex:1;}
.panel-title{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:10px;}
.summary-row{display:grid;grid-template-columns:1fr auto auto;gap:5px;align-items:center;
  padding:5px 0;border-bottom:1px solid var(--border);font-size:11px;}
.summary-row:last-child{border-bottom:none;}
.s-name{color:var(--muted);font-size:10px;}
.s-val{font-family:var(--mono);font-weight:700;text-align:right;}
.s-pct{font-size:9px;color:var(--muted);font-family:var(--mono);text-align:right;min-width:32px;}
.summary-total{margin-top:8px;padding-top:8px;border-top:2px solid var(--border);
  display:grid;grid-template-columns:1fr auto auto;gap:5px;font-size:12px;font-weight:700;}
.actions-panel{display:flex;flex-direction:column;gap:6px;}
.btn-action{padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);
  color:var(--text);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;
  transition:all .18s;display:flex;align-items:center;gap:8px;touch-action:manipulation;
  width:100%;min-height:var(--tap);}
.btn-action:active{background:var(--surface2);border-color:var(--accent);color:var(--accent);}
.btn-action.danger:active{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.08);}
.btn-action.success-btn{border-color:var(--green);color:var(--green);}
.btn-action.success-btn:active{background:rgba(16,185,129,.08);}
#csvFileInput{display:none;}

/* ── NOTIFICATION ── */
.notification{position:fixed;top:12px;right:12px;background:var(--surface2);
  border:1px solid var(--accent);color:var(--accent);padding:10px 16px;
  border-radius:10px;font-family:var(--mono);font-size:12px;z-index:1000;
  opacity:0;transform:translateY(-8px);transition:all .25s;pointer-events:none;max-width:280px;}
.notification.show{opacity:1;transform:translateY(0);}
.notification.error{border-color:var(--red);color:var(--red);}
.notification.success{border-color:var(--green);color:var(--green);}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);
  z-index:500;display:none;align-items:center;justify-content:center;padding:14px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:20px;max-width:640px;width:100%;max-height:88vh;overflow-y:auto;}
.modal h2{font-family:var(--mono);font-size:13px;color:var(--accent);margin-bottom:16px;letter-spacing:1px;}
.modal table{width:100%;border-collapse:collapse;font-size:11px;}
.modal th{text-align:left;padding:6px 8px;font-family:var(--mono);font-size:9px;
  text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--border);}
.modal td{padding:7px 8px;border-bottom:1px solid var(--border);color:var(--text);}
.modal td:nth-child(3),.modal td:nth-child(4),.modal td:nth-child(5){font-family:var(--mono);font-weight:700;}
.modal-footer{margin-top:12px;background:var(--surface2);border-radius:8px;padding:10px;
  font-size:10px;color:var(--muted);font-family:var(--mono);line-height:1.8;}
.modal-close{margin-top:14px;padding:10px 22px;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);border-radius:8px;cursor:pointer;font-family:var(--sans);font-size:13px;
  min-height:var(--tap);width:100%;}
.modal-close:active{border-color:var(--accent);color:var(--accent);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}

/* ════════════════════════════════════════════
   TABLET  ≤ 900px
════════════════════════════════════════════ */
@media(max-width:900px){
  .main-grid{grid-template-columns:1fr;}
  .right-panel{flex-direction:row;flex-wrap:wrap;}
  .summary-panel{flex:1;min-width:240px;}
  .actions-panel{flex-direction:row;flex-wrap:wrap;flex:1;min-width:180px;}
  .btn-action{flex:1;min-width:130px;}
}

/* ════════════════════════════════════════════
   MOBILE  ≤ 600px  — complete redesign
════════════════════════════════════════════ */
@media(max-width:600px){

  /* Header compact */
  header{gap:8px;padding-bottom:12px;}
  .logo-text p{display:none;}
  .hstat-val{font-size:20px;}

  /* Progress stays */

  /* Dictation bar minimal */
  .dictation-bar{padding:6px 0 8px;}

  /* How-to toggle visible, cards grid 1-col */
  .how-to{grid-template-columns:1fr;}

  /* ── CELLS: 1 column, big cards ── */
  .cells-panel{grid-template-columns:1fr;gap:8px;}

  /* Mobile card: horizontal layout */
  .cell-card{
    padding:0;
    display:grid;
    /* [color bar] [name+tag] [big count] [+/-/reset] */
    grid-template-columns:5px 1fr auto auto;
    grid-template-rows:auto;
    align-items:stretch;
    border-radius:12px;
    overflow:hidden;
    min-height:64px;
  }
  .cell-card::before{
    /* Reuse as left color bar */
    position:relative;
    top:auto;left:auto;right:auto;
    width:5px;height:auto;
    opacity:1;
    border-radius:0;
    grid-column:1;
    grid-row:1/3;
  }

  /* Name + tag block */
  .card-top{
    grid-column:2;
    grid-row:1;
    padding:10px 10px 0 10px;
    margin-bottom:0;
    flex-direction:column;
    align-items:flex-start;
    gap:2px;
  }
  .card-name{font-size:13px;font-weight:700;}
  .card-shortcut{display:none;} /* hide on mobile to save space */

  /* Description hidden on mobile */
  .card-desc{display:none;}

  /* Tag on its own row under name */
  .card-tag{
    grid-column:2;
    grid-row:2;
    margin:0 0 8px 10px;
    padding:1px 6px;
    font-size:8px;
    display:inline-block;
    width:fit-content;
  }

  /* Big count */
  .card-count{
    grid-column:3;
    grid-row:1/3;
    font-size:42px;
    padding:0 12px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-left:1px solid var(--border);
    min-width:80px;
    line-height:1;
  }

  /* +/- buttons as tall vertical column */
  .btn-row{
    grid-column:4;
    grid-row:1/3;
    flex-direction:column;
    margin:0;
    gap:0;
    border-left:1px solid var(--border);
    width:48px;
  }
  .btn-inc,.btn-dec,.btn-rst{
    flex:1;
    border:none;
    border-radius:0;
    min-height:0;
    font-size:18px;
    border-bottom:1px solid var(--border);
    padding:0;
  }
  .btn-rst{border-bottom:none;font-size:13px;}
  .btn-inc{border-top:none;}

  /* Progress bar hidden inside cards on mobile */
  .card-bar{display:none;}

  /* Section label full width */
  .section-label{font-size:9px;padding:4px 0 3px;}

  /* Right panel stacked on mobile */
  .right-panel{flex-direction:column;}
  .summary-panel{min-width:unset;}
  .actions-panel{flex-direction:column;}
  .btn-action{min-width:unset;flex:none;}
}
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon">🔬</div>
      <div class="logo-text">
        <h1>BMCyt Counter</h1>
        <p>HUMNxl · Bolognesi 2013</p>
      </div>
    </div>
    <div class="header-right">
      <div class="lang-toggle">
        <button class="lang-btn active" id="btnES" onclick="setLang('es')">ES</button>
        <button class="lang-btn"         id="btnEN" onclick="setLang('en')">EN</button>
      </div>
      <div class="header-stats">
        <div class="hstat"><div class="hstat-val" id="totalCount">0</div><div class="hstat-label" id="lbl-totalH">Total</div></div>
        <div class="hstat"><div class="hstat-val" id="pctCount">0%</div><div class="hstat-label" id="lbl-avance">Avance</div></div>
        <div class="hstat"><div class="hstat-val" id="remainCount">2000</div><div class="hstat-label" id="lbl-rest">Restantes</div></div>
      </div>
    </div>
  </header>

  <!-- PROGRESS -->
  <div class="progress-section">
    <div class="progress-labels"><span id="lbl-prog">PROGRESO</span><span id="progressLabel">0 / 2000</span></div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="milestones">
      <div class="ms" id="ms500">500</div>
      <div class="ms" id="ms1000">1000 ★</div>
      <div class="ms" id="ms1500">1500</div>
      <div class="ms" id="ms2000">2000 ✓</div>
    </div>
  </div>

  <!-- DICTATION BAR — sticky, minimal -->
  <div class="dictation-bar">
    <div class="dictation-inner" id="dictInner">
      <span class="mic-icon" id="dictLangIcon">🎙️ ES</span>
      <input type="text" id="dictInput" class="dictation-input"
        placeholder="Dictado de voz — escribe o habla el tipo de célula"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
      <span class="dictation-status" id="dictStatus">—</span>
      <button class="btn-clear-dict" id="btnClearDict" onclick="manualClear()">×</button>
    </div>

    <!-- COLLAPSIBLE HOW-TO -->
    <button class="howto-toggle" id="howtoToggleBtn" onclick="toggleHowto()">
      <span id="howtoToggleLabel">❓ Cómo activar el dictado / atajos</span>
      <span class="howto-arrow" id="howtoArrow">▾</span>
    </button>
    <div class="howto-body" id="howtoBody">
      <div class="how-to" id="howToGrid"></div>
    </div>

    <!-- Quick chips -->
    <div class="chips" id="chipsRow"></div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-grid">
    <div class="cells-panel" id="cellsGrid"></div>

    <div class="right-panel">
      <div class="summary-panel">
        <div class="panel-title" id="summaryTitle">Resumen de Conteo</div>
        <div id="summaryRows"></div>
        <div class="summary-total">
          <span style="color:var(--text)" id="labelTotal">TOTAL</span>
          <span style="color:var(--accent);font-family:var(--mono)" id="summaryTotal">0</span>
          <span style="color:var(--accent);font-family:var(--mono);font-size:10px" id="summaryPct">0%</span>
        </div>
      </div>
      <div class="actions-panel">
        <button class="btn-action"             onclick="showReport()">📊 <span id="lbl-report">Reporte completo</span></button>
        <button class="btn-action success-btn" onclick="exportCSV()">⬇️ <span id="lbl-export">Guardar sesión (CSV)</span></button>
        <button class="btn-action"             onclick="document.getElementById('csvFileInput').click()">📂 <span id="lbl-import">Cargar sesión (CSV)</span></button>
        <input type="file" id="csvFileInput" accept=".csv" onchange="importCSV(event)">
        <button class="btn-action"             onclick="undoLast()">↩️ <span id="lbl-undo">Deshacer último</span></button>
        <button class="btn-action danger"      onclick="confirmReset()">🗑️ <span id="lbl-reset">Reiniciar todo</span></button>
      </div>
    </div>
  </div>
</div>

<div class="notification" id="notification"></div>

<div class="modal-overlay" id="reportModal">
  <div class="modal">

// ═══════════════════════════════
// STATE

function renderGrid(){
  const u=UI[lang];
  g('cellsGrid').innerHTML=SECTION_KEYS.map((keys,si)=>
    `<div class="section-label">${u.sections[si]}</div>`+
    keys.map(key=>{
      const d=CELL_DEFS.find(x=>x.key===key);
      const label=lang==='es'?d.labelEs:d.labelEn;
      const tag  =lang==='es'?d.tagEs:d.tagEn;
      const desc =lang==='es'?d.descEs:d.descEn;
      const voice=lang==='es'?d.voiceEs:d.voiceEn;
      const kb=Object.entries(KEY_MAP).find(([k,v])=>v===key)?.[0]?.toUpperCase()||'';
      return `
      <div class="cell-card" style="--card-color:${d.color}" data-key="${key}" onclick="addCell('${key}')">
        <div class="card-top">
          <div class="card-name">${label}</div>
          <div class="card-shortcut">${voice} · <kbd>${kb}</kbd></div>
        </div>
        <div class="card-count" id="count-${key}">${cells[key]}</div>
        <div class="card-tag">${tag}</div>
        <div class="card-desc">${desc}</div>
        <div class="card-bar"><div class="card-bar-fill" id="bar-${key}" style="width:0%"></div></div>
        <div class="btn-row">
          <button class="btn-inc" onclick="event.stopPropagation();addCell('${key}')">＋</button>
          <button class="btn-dec" onclick="event.stopPropagation();removeCell('${key}')">−</button>
          <button class="btn-rst" onclick="event.stopPropagation();resetOne('${key}')">↺</button>
        </div>
      </div>`;
    }).join('')
  ).join('');
  refreshAllBars();
}

  g('howToGrid').innerHTML=UI[lang].howTo.map(c=>

function renderChips(){
  const u=UI[lang];
  g('chipsRow').innerHTML=
    u.chips.map((label,i)=>
      `<span class="chip" onclick="addCell('${u.chipsKeys[i]}')">${label}</span>`

    `<span class="chip undo" onclick="undoLast()">${u.undoChip}</span>`;
}

// ═══════════════════════════════
// COUNTER CORE
// ═══════════════════════════════
function getTotal(){return Object.values(cells).reduce((s,v)=>s+v,0);}

function addCell(key){
  if(getTotal()>=GOAL){showNotif(UI[lang].notifGoal,'success');return;}
  cells[key]++;
  hist.push({key,a:'add'});
  refreshCard(key);updateProgress();flash(key);
}

function removeCell(key){
  if(cells[key]>0){cells[key]--;hist.push({key,a:'sub'});refreshCard(key);updateProgress();}
}

function resetOne(key){
  cells[key]=0;hist=hist.filter(h=>h.key!==key);
  refreshCard(key);updateProgress();
}

function undoLast(){
  if(!hist.length){showNotif(UI[lang].notifNoUndo,'error');return;}
  const last=hist.pop();
  if(last.a==='add') cells[last.key]=Math.max(0,cells[last.key]-1);
  else cells[last.key]++;
  refreshCard(last.key);updateProgress();
  const def=CELL_DEFS.find(d=>d.key===last.key);
  showNotif(UI[lang].notifUndo+(lang==='es'?def.labelEs:def.labelEn));
}

function confirmReset(){
  if(confirm(UI[lang].confirmReset)){
    CELL_DEFS.forEach(d=>cells[d.key]=0);hist=[];
    renderGrid();updateProgress();updateSummary();
    showNotif(UI[lang].notifReset);
  }
}

// ═══════════════════════════════
// DICTATION — cooldown strategy
// ═══════════════════════════════
const dictInput =g('dictInput');
const dictStatus=g('dictStatus');
const dictInner =g('dictInner');

let dictTimer=null, cooldownActive=false, cooldownTimer=null;

dictInput.addEventListener('input',()=>{
  if(cooldownActive){dictInput.value='';return;}
  clearTimeout(dictTimer);
  const text=dictInput.value.trim();
  if(!text) return;
  dictTimer=setTimeout(triggerProcess,700);
});

dictInput.addEventListener('keydown',e=>{
  if(!e.ctrlKey&&!e.metaKey&&!e.altKey&&e.key.length===1){
    const k=e.key.toLowerCase();
    if(KEY_MAP[k]){e.preventDefault();addCell(KEY_MAP[k]);return;}
    if(k==='z'){e.preventDefault();undoLast();return;}
  }
  if(e.key==='Enter'){clearTimeout(dictTimer);triggerProcess();e.preventDefault();}
});

function triggerProcess(){
  const text=dictInput.value.trim();
  if(!text) return;
  startCooldown();
  processChunk(text);
}

function startCooldown(){
  cooldownActive=true;
  dictInput.value='';
  clearTimeout(cooldownTimer);
  cooldownTimer=setTimeout(()=>{cooldownActive=false;},450);
}

function manualClear(){
  clearTimeout(dictTimer);
  startCooldown();
  setFeedback('','');
}

function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}

function matchWord(word,map){
  for(const entry of map){
    for(const trigger of entry.w){
      const t=norm(trigger);
      if(word===t) return entry.k;
      if(word.startsWith(t)&&t.length>=3) return entry.k;
      if(t.startsWith(word)&&word.length>=3) return entry.k;
    }
  }
  return null;
}

function processChunk(text){
  const u=UI[lang];
  const pMap=lang==='es'?CMD_ES:CMD_EN;
  const fMap=lang==='es'?CMD_EN:CMD_ES;
  const words=norm(text).split(/[\s,;.:!?()\-]+/).filter(Boolean);

  if(words.some(w=>u.undoWords.includes(w))){undoLast();setFeedback('↩','ok');return;}

  let count=0,lastLabel='';
  for(const word of words){
    const matched=matchWord(word,pMap)||matchWord(word,fMap);
    if(matched){
      addCell(matched);count++;
      const def=CELL_DEFS.find(d=>d.key===matched);
      lastLabel=lang==='es'?def.labelEs:def.labelEn;
    }
  }
  if(count===1) setFeedback(u.feedbackOk+lastLabel,'ok');
  else if(count>1) setFeedback('✓ '+count+u.feedbackMulti,'ok');
  else setFeedback(u.feedbackErr+'"'+text+'"','err');
}

function setFeedback(msg,type){
  dictStatus.textContent=msg;
  dictStatus.className='dictation-status '+(type||'');
  dictInner.className='dictation-inner '+(type==='ok'?'matched':type==='err'?'no-match':'');
  clearTimeout(dictInner._t);
  dictInner._t=setTimeout(()=>{
    dictInner.className='dictation-inner';
    dictStatus.textContent='—';
    dictStatus.className='dictation-status';
  },2200);
}

// Global shortcuts (when field not focused)
document.addEventListener('keydown',e=>{
  if(e.target===dictInput) return;
  if(e.target.tagName==='INPUT'||e.target.tagName==='BUTTON'||e.target.tagName==='TEXTAREA') return;
  if(e.ctrlKey||e.metaKey||e.altKey) return;
  const k=e.key.toLowerCase();
  if(KEY_MAP[k]){addCell(KEY_MAP[k]);return;}
  if(k==='z') undoLast();
});

// ═══════════════════════════════
// UI UPDATE
// ═══════════════════════════════
function refreshCard(key){
  const cnt=g('count-'+key);
  if(cnt) cnt.textContent=cells[key];
  refreshAllBars();updateSummary();
}

function refreshAllBars(){
  const total=getTotal();
  CELL_DEFS.forEach(d=>{
    const bar=g('bar-'+d.key);
    if(bar) bar.style.width=total>0?(cells[d.key]/total*100)+'%':'0%';
  });
}

function updateProgress(){
  const total=getTotal(),pct=Math.min(100,total/GOAL*100);
  g('totalCount').textContent=total;
  g('pctCount').textContent=pct.toFixed(1)+'%';
  g('remainCount').textContent=Math.max(0,GOAL-total);
  g('progressFill').style.width=pct+'%';
  g('progressLabel').textContent=total+' / '+GOAL;
  [500,1000,1500,2000].forEach((m,i,arr)=>{
    const e2=g('ms'+m);
    if(total>=m) e2.className='ms reached';
    else if(total>=(arr[i-1]||0)) e2.className='ms active';
    else e2.className='ms';
  });
  if(total===GOAL) showNotif(UI[lang].notifDone,'success');
}

function updateSummary(){
  const total=getTotal();
  g('summaryRows').innerHTML=CELL_DEFS.map(d=>{
    const label=lang==='es'?d.labelEs:d.labelEn;
    const pct=total>0?(cells[d.key]/total*100).toFixed(1):'0.0';
    return `<div class="summary-row"><span class="s-name">${label}</span><span class="s-val">${cells[d.key]}</span><span class="s-pct">${pct}%</span></div>`;
  }).join('');
  g('summaryTotal').textContent=total;
  g('summaryPct').textContent=total>0?(total/GOAL*100).toFixed(1)+'%':'0%';
}

function flash(key){
  const card=document.querySelector('[data-key="'+key+'"]');
  if(!card) return;
  card.classList.add('flash');
  setTimeout(()=>card.classList.remove('flash'),260);
}

function showNotif(msg,type=''){
  const n=g('notification');
  n.textContent=msg;n.className='notification show'+(type?' '+type:'');
  clearTimeout(n._t);n._t=setTimeout(()=>n.className='notification',2800);
}

// ═══════════════════════════════
// REPORT
// ═══════════════════════════════
function showReport(){
  const u=UI[lang],total=getTotal();
  g('reportTitle').textContent=u.reportTitle;
  g('reportBody').innerHTML=CELL_DEFS.map(d=>{
    const label=lang==='es'?d.labelEs:d.labelEn,cat=lang==='es'?d.catEs:d.catEn;
    const pct=total>0?(cells[d.key]/total*100).toFixed(2):'0.00';
    const p1k=total>0?(cells[d.key]/total*1000).toFixed(2):'0.00';
    return `<tr><td>${cat}</td><td>${label}</td><td>${cells[d.key]}</td><td>${pct}%</td><td>${p1k}</td></tr>`;
  }).join('');
  const diff=cells.diferenciada+cells.micronucleo+cells.nbud+cells.binucleada;
  const mnF=diff>0?(cells.micronucleo/diff*1000).toFixed(2):'N/A';
  const nF=diff>0?(cells.nbud/diff*1000).toFixed(2):'N/A';
  const death=cells.cromatina+cells.cariorrexis+cells.picnosis+cells.cariolisis;
  g('reportFooter').innerHTML=
    `${u.rTotal}: ${total}/${GOAL} | ${u.rDiff}: ${diff} | ${u.rMN}: ${mnF}/1000 | ${u.rNBUD}: ${nF}/1000<br>`+
    `${u.rDeath}: ${death} | ${u.rDate}: ${new Date().toLocaleString(lang==='es'?'es-MX':'en-US')}<br>`+
    `${u.rProto}: BMCyt HUMNxl — Bolognesi et al. 2013 · Thomas et al. 2009`;
  g('reportModal').classList.add('open');
}
function closeModal(){g('reportModal').classList.remove('open');}

// ═══════════════════════════════
// CSV
// ═══════════════════════════════
function exportCSV(){
  const total=getTotal(),now=new Date();
  let csv='#BMCyt_SESSION\n';
  csv+=`#Date,${now.toISOString()}\n#Protocol,HUMNxl Bolognesi 2013\n#Goal,${GOAL}\n#Lang,${lang}\n\n`;
  csv+='key,label_es,label_en,category_es,category_en,count,pct,per_1000\n';
  CELL_DEFS.forEach(d=>{
    const pct=total>0?(cells[d.key]/total*100).toFixed(2):'0.00';
    const p1k=total>0?(cells[d.key]/total*1000).toFixed(2):'0.00';
    csv+=`${d.key},${d.labelEs},${d.labelEn},${d.catEs},${d.catEn},${cells[d.key]},${pct},${p1k}\n`;
  });
  csv+=`\n#TOTAL,${total},,,,${total},,\n`;
  const ds=now.toISOString().replace(/[:.]/g,'-').slice(0,16);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`BMCyt_session_${ds}.csv`;a.click();
  showNotif(UI[lang].notifExport,'success');
}

function importCSV(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const lines=e.target.result.split('\n');let loaded=false;
      for(const line of lines){
        const t=line.trim();
        if(!t||t.startsWith('#')||t.startsWith('key,'))continue;
        const parts=t.split(',');if(parts.length<6)continue;
        const key=parts[0].trim(),count=parseInt(parts[5].trim(),10);
        if(cells.hasOwnProperty(key)&&!isNaN(count)&&count>=0){cells[key]=count;loaded=true;}
      }
      if(!loaded)throw new Error();
      hist=[];renderGrid();updateProgress();updateSummary();
      showNotif(UI[lang].notifImport,'success');
    }catch(err){showNotif(UI[lang].notifImportErr,'error');}
    event.target.value='';
  };
  reader.readAsText(file);
}

// ═══════════════════════════════
renderGrid();renderHowTo();renderChips();updateSummary();updateProgress();updateLabels();
