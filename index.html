<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e14">
<title>BMCyt Counter</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --bg:#0a0e14; --surface:#111720; --surface2:#1a2233; --border:#1e2d45;
  --accent:#00d4ff; --accent2:#7c3aed; --green:#10b981; --yellow:#f59e0b;
  --red:#ef4444; --text:#e2e8f0; --muted:#64748b;
  --mono:'Space Mono',monospace; --sans:'DM Sans',sans-serif;
  --radius:14px; --bar-h:60px; --top-h:112px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);
  overflow-x:hidden;-webkit-font-smoothing:antialiased;}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;min-height:100vh;min-height:100dvh;}
.screen.active{display:flex;}

/* ══════════════════════════════════════
   SETUP SCREEN
══════════════════════════════════════ */
#scSetup{
  align-items:center;justify-content:center;
  padding:24px 20px env(safe-area-inset-bottom,20px);
  background:var(--bg);
}
.setup-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:28px 24px;width:100%;max-width:420px;
}
.setup-logo{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.setup-logo-icon{
  width:44px;height:44px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.setup-logo-text h1{font-family:var(--mono);font-size:15px;color:var(--accent);
  letter-spacing:2px;text-transform:uppercase;}
.setup-logo-text p{font-size:10px;color:var(--muted);letter-spacing:.5px;margin-top:2px;}

.lang-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);
  border-radius:9px;padding:3px;gap:3px;margin-left:auto;}
.lang-btn{padding:6px 14px;border-radius:6px;border:none;background:transparent;
  color:var(--muted);font-family:var(--mono);font-size:11px;font-weight:700;
  cursor:pointer;transition:all .2s;letter-spacing:1px;}
.lang-btn.active{background:var(--accent);color:#000;}

.resume-banner{
  background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.25);
  border-radius:10px;padding:12px 14px;margin-bottom:20px;
  font-size:12px;color:var(--accent);line-height:1.6;
}
.resume-banner strong{display:block;font-size:13px;margin-bottom:4px;}

.form-group{margin-bottom:16px;}
.form-label{font-size:11px;color:var(--muted);text-transform:uppercase;
  letter-spacing:.8px;font-family:var(--mono);margin-bottom:6px;display:block;}
.form-label span{color:var(--red);}
.form-input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:14px 16px;color:var(--text);
  font-family:var(--sans);font-size:16px;outline:none;transition:border-color .2s;
}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.1);}
.form-input::placeholder{color:var(--muted);}

.setup-actions{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
.btn-start{
  padding:16px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;font-family:var(--sans);font-size:16px;font-weight:700;
  cursor:pointer;transition:opacity .15s;letter-spacing:.3px;
}
.btn-start:active{opacity:.8;}
.btn-resume{
  padding:14px;border-radius:12px;border:1px solid var(--accent);
  background:transparent;color:var(--accent);font-family:var(--sans);
  font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;
}
.btn-resume:active{background:rgba(0,212,255,.1);}
.btn-new{
  padding:12px;border-radius:12px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-family:var(--sans);
  font-size:14px;cursor:pointer;transition:all .15s;
}
.btn-new:active{color:var(--red);border-color:var(--red);}
.btn-import{
  padding:14px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--green),#059669);
  color:#fff;font-family:var(--sans);font-size:15px;font-weight:700;
  cursor:pointer;transition:opacity .15s;width:100%;
}
.btn-import:active{opacity:.8;}

/* ══════════════════════════════════════
   COUNTER SCREEN
══════════════════════════════════════ */
#scCounter{background:var(--bg);}

/* ── TOP BAR ── */
.top-bar{
  position:sticky;top:0;z-index:100;
  background:var(--bg);
  padding:env(safe-area-inset-top,0) 0 0;
}
.top-bar-inner{
  padding:10px 16px 0;
  border-bottom:1px solid var(--border);
}
.top-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;}
.top-logo{display:flex;align-items:center;gap:8px;}
.top-logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.top-logo-label{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:1.5px;}
.top-participant{
  font-size:11px;color:var(--muted);font-family:var(--mono);
  background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;padding:3px 8px;cursor:pointer;max-width:140px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.top-stats{display:flex;gap:16px;}
.top-stat{text-align:right;}
.top-stat-val{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent);line-height:1;}
.top-stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}

/* progress */
.progress-wrap{padding:8px 16px 10px;}
.progress-track{height:8px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:99px;transition:width .35s ease;width:0%;}
.milestones{display:flex;gap:4px;margin-top:5px;}
.ms{flex:1;text-align:center;font-size:8px;color:var(--muted);font-family:var(--mono);
  padding:2px;border-radius:3px;border:1px solid transparent;transition:all .3s;}
.ms.reached{color:var(--accent);border-color:var(--accent);background:rgba(0,212,255,.08);}
.ms.active{color:var(--yellow);border-color:var(--yellow);background:rgba(245,158,11,.1);animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* ── CELLS SCROLL AREA ── */
.cells-scroll{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:12px 14px calc(var(--bar-h) + env(safe-area-inset-bottom,12px) + 12px);
}

/* ── SECTION LABEL ── */
.section-lbl{
  font-size:10px;text-transform:uppercase;letter-spacing:2px;
  color:var(--muted);font-family:var(--mono);
  padding:4px 2px 6px;margin-top:10px;
  border-bottom:1px solid var(--border);margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}
.section-lbl:first-child{margin-top:0;}
.section-dot{width:6px;height:6px;border-radius:50%;background:var(--section-color,var(--muted));flex-shrink:0;}

/* ── CELL GRID ── */
.cell-grid{display:grid;gap:8px;margin-bottom:4px;}
.cell-grid.cols-1{grid-template-columns:1fr;}
.cell-grid.cols-2{grid-template-columns:1fr 1fr;}
.cell-grid.cols-3{grid-template-columns:1fr 1fr 1fr;}

/* ── CELL BUTTON ── */
.cell-btn{
  --cc:var(--accent);
  background:var(--surface);border:1px solid var(--border);
  border-top:3px solid var(--cc);
  border-radius:var(--radius);
  display:flex;flex-direction:column;
  align-items:stretch;
  cursor:pointer;user-select:none;touch-action:manipulation;
  position:relative;overflow:hidden;
  transition:background .1s, border-color .1s;
  -webkit-user-select:none;
}
.cell-btn:active{background:var(--surface2);border-color:var(--cc);}
.cell-btn.flash{animation:btnFlash .22s ease;}
@keyframes btnFlash{
  0%{transform:scale(1)}
  40%{transform:scale(.95);background:rgba(255,255,255,.06)}
  100%{transform:scale(1)}
}

/* Wide card (cols-2) */
.cols-2 .cell-btn{min-height:200px;}
.cols-2 .cell-btn-body{
  flex:1;display:flex;flex-direction:row;
  justify-content:space-between;padding:14px 14px 8px;
}
.cols-2 .cell-btn-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.3;}
.cols-2 .cell-btn-tag{font-size:8px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
.cols-2 .cell-btn-count{
  font-family:var(--mono);font-size:24px;font-weight:700;
  color:var(--cc);line-height:1;margin:6px 0 10px;
}
.cols-2 .cell-btn-minus{
  border-top:1px solid var(--border);
  padding:12px;text-align:center;
  font-size:18px;color:var(--muted);font-family:var(--mono);
  background:transparent;border:none;border-top:1px solid var(--border);
  cursor:pointer;touch-action:manipulation;width:100%;
  min-height:52px;display:flex;align-items:center;justify-content:center;
}
.cols-2 .cell-btn-minus:active{background:rgba(239,68,68,.12);color:var(--red);}

/* Narrow card (cols-3) */
.cols-3 .cell-btn{min-height:100px;}
.cols-3 .cell-btn-body{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:8px 6px 4px;text-align:center;
}
.cols-3 .cell-btn-name{font-size:10px;font-weight:700;color:var(--text);line-height:1.3;}
.cols-3 .cell-btn-tag{font-size:7px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.3px;}
.cols-3 .cell-btn-count{
  font-family:var(--mono);font-size:32px;font-weight:700;
  color:var(--cc);line-height:1;margin:6px 0 6px;
}
.cols-3 .cell-btn-minus{
  border-top:1px solid var(--border);
  padding:6px;text-align:center;
  font-size:18px;color:var(--muted);
  background:transparent;border:none;border-top:1px solid var(--border);
  cursor:pointer;touch-action:manipulation;width:100%;
  min-height:36px;display:flex;align-items:center;justify-content:center;
}
.cols-3 .cell-btn-minus:active{background:rgba(239,68,68,.12);color:var(--red);}

/* cols-1 (MN card) minus button */
.cols-1 .cell-btn-minus{
  border-top:1px solid var(--border);
  padding:6px;text-align:center;
  font-size:15px;color:var(--muted);font-family:var(--mono);
  background:transparent;border:none;border-top:1px solid var(--border);
  cursor:pointer;touch-action:manipulation;width:100%;
  min-height:36px;display:flex;align-items:center;justify-content:center;
}
.cols-1 .cell-btn-minus:active{background:rgba(239,68,68,.12);color:var(--red);}

/* Micronúcleo counter: desktop 26px (pane override needed since inline was removed) */
.mn-cell-count{font-size:26px;padding:0;}

/* ── TWO/THREE-PANE LAYOUT ── */
.two-pane,.three-pane{display:flex;gap:8px;align-items:flex-start;margin-bottom:4px;}
.pane{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px;}
.pane .cell-btn{min-height:72px;}
.pane .cell-btn-body{
  flex:1;display:flex;flex-direction:column;
  justify-content:space-between;padding:9px 10px 5px;
}
.pane .cell-btn-name{font-size:15px;font-weight:700;color:var(--text);line-height:1.3;}
.pane .cell-btn-tag{font-size:5px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.3px;}
.pane .cell-btn-count{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--cc);line-height:1;margin:4px 0 4px;
}
.pane .cell-btn-minus{
  border-top:1px solid var(--border);padding:5px;text-align:center;
  font-size:16px;color:var(--muted);background:transparent;border:none;
  border-top:1px solid var(--border);cursor:pointer;touch-action:manipulation;
  width:100%;min-height:30px;display:flex;align-items:center;justify-content:center;
}
.pane .cell-btn-minus:active{background:rgba(239,68,68,.12);color:var(--red);}
.pane .mn-extra-row{padding:6px 8px;gap:4px;}
.pane .mn-extra-label{font-size:12px;}
.pane .mn-extra-val{font-size:12px;min-width:30px;}
.pane .mn-extra-btn{width:26px;height:36px;font-size:20px;}
.pane .mn-total-row{padding:3px 8px 7px;font-size:8px;gap:6px;}
.pane [data-key="micronucleo"]{flex:4;}

/* ── MN EXTRA COUNTER ── */
.mn-extra-row{
  border-top:1px solid var(--border);
  background:rgba(245,158,11,.05);
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;
  /* stop the card's tap-to-add from firing */
  position:relative;z-index:2;
}
.mn-extra-label{
  flex:1;font-size:10px;color:var(--muted);font-family:var(--mono);
  text-transform:uppercase;letter-spacing:.5px;line-height:1.3;
}
.mn-extra-val{
  font-family:var(--mono);font-size:22px;font-weight:700;
  color:#f59e0b;min-width:32px;text-align:center;
}
.mn-extra-btn{
  min-width:44px;border:1px solid var(--border);border-radius:8px;
  background:transparent;color:var(--muted);font-size:16px;
  padding:10px 14px;
  cursor:pointer;touch-action:manipulation;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:var(--mono);
}
.mn-extra-btn:active{background:rgba(245,158,11,.18);color:#f59e0b;border-color:#f59e0b;}
.mn-total-row{
  padding:6px 14px 10px;
  font-size:10px;color:var(--muted);font-family:var(--mono);
  display:flex;gap:12px;flex-wrap:wrap;
}
.mn-total-row span{color:#f59e0b;font-weight:700;}

/* ── BOTTOM BAR ── */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
  padding:10px 14px env(safe-area-inset-bottom,10px);
  height:calc(var(--bar-h) + env(safe-area-inset-bottom,0px));
}
.bar-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:8px 6px;border-radius:10px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;touch-action:manipulation;
  font-family:var(--sans);transition:all .15s;min-height:44px;
}
.bar-btn:active{background:var(--surface2);border-color:var(--accent);color:var(--accent);}
.bar-btn-icon{font-size:18px;line-height:1;}
.bar-btn-label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;font-family:var(--mono);}
.bar-btn.primary{
  background:linear-gradient(135deg,rgba(0,212,255,.12),rgba(124,58,237,.12));
  border-color:var(--accent);color:var(--accent);flex:1.5;
}
.bar-btn.primary:active{opacity:.7;}
.bar-btn.danger:active{border-color:var(--red);color:var(--red);}

/* ── RESPONSIVE: MOBILE (< 640px) ── */
@media (max-width:639px){
  /* — tokens — */
  :root{ --bar-h:72px; }

  /* — bottom bar — */
  .bottom-bar{gap:6px;padding:8px 10px env(safe-area-inset-bottom,8px);}
  .bar-btn{min-height:56px;padding:10px 4px;gap:4px;border-radius:12px;}
  .bar-btn-icon{font-size:22px;}
  .bar-btn-label{font-size:11px;letter-spacing:.3px;}
  .bar-btn.primary{flex:2;}

  /* — tres columnas: columna central más ancha (Diferenciada destacada) — */
  .two-pane,.three-pane{gap:5px;}
  .three-pane .pane:nth-child(2){flex:1.8;}
  .pane{gap:5px;}

  /* — cards: proporción táctil correcta (cuerpo ~52px + minus 44px = 96px) — */
  .pane .cell-btn{min-height:96px;}
  .pane .cell-btn-body{padding:10px 10px 5px;}
  .pane .cell-btn-name{font-size:13px;}
  /* Todos los contadores: 20px uniforme en móvil */
  .pane .cell-btn-count,.pane .mn-cell-count,.pane .mn-extra-val{font-size:20px;margin:4px 0 4px;}

  /* — MN Extra: dos filas para usabilidad táctil — */
  /* Fila 1: etiqueta (ancho completo)              */
  /* Fila 2: valor | + | −  (cada uno flex:1, 44px) */
  .pane .mn-extra-row{flex-wrap:wrap;padding:6px 8px;gap:4px;}
  .pane .mn-extra-label{flex-basis:100%;font-size:10px;}
  .pane .mn-kbd-badge{display:none;}
  .pane .mn-extra-val{flex:1;font-size:20px;min-width:36px;text-align:center;}
  .pane .mn-extra-btn{flex:1;min-height:44px;height:44px;width:auto;font-size:20px;}
  .pane .mn-total-row{font-size:7px;padding:3px 8px 6px;gap:4px;}

  /* — etiqueta de sección — */
  .pane .section-lbl{margin-top:4px;font-size:9px;}
}

/* ══════════════════════════════════════
   VOICE MODAL (slides up from bottom)
══════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  z-index:500;display:none;align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal-sheet{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px 20px 0 0;width:100%;max-width:600px;
  padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-pill{width:36px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 16px;}
.modal-title{font-family:var(--mono);font-size:11px;color:var(--accent);
  text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;}

/* voice input */
.voice-input-wrap{
  display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:2px solid var(--border);
  border-radius:12px;padding:10px 14px;margin-bottom:12px;
  transition:border-color .2s;
}
.voice-input-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.1);}
.voice-input-wrap.matched{border-color:var(--green);}
.voice-input-wrap.no-match{border-color:var(--red);}
.voice-input{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-size:18px;font-family:var(--sans);
  caret-color:var(--accent);
}
.voice-input::placeholder{color:var(--muted);font-size:14px;}
.voice-status{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap;}
.voice-status.ok{color:var(--green);}
.voice-status.err{color:var(--red);}
.voice-clear{background:transparent;border:none;color:var(--muted);
  font-size:20px;cursor:pointer;padding:2px 4px;line-height:1;}
.voice-clear:active{color:var(--red);}

.voice-hint{font-size:11px;color:var(--muted);line-height:1.7;margin-bottom:14px;}
.voice-hint strong{color:var(--text);}

/* chips */
.voice-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.vchip{
  background:var(--surface2);border:1px solid var(--border);border-radius:99px;
  padding:7px 14px;font-size:12px;font-family:var(--mono);color:var(--muted);
  cursor:pointer;touch-action:manipulation;transition:all .15s;
}
.vchip:active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.08);}

.voice-close{
  width:100%;padding:14px;border-radius:12px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-family:var(--sans);font-size:15px;cursor:pointer;
}
.voice-close:active{border-color:var(--muted);}

/* ══════════════════════════════════════
   REPORT MODAL
══════════════════════════════════════ */
.report-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.85);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  z-index:500;display:none;flex-direction:column;
  padding:env(safe-area-inset-top,0) 0 0;
}
.report-overlay.open{display:flex;}
.report-inner{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  background:var(--surface);padding:20px 16px;
}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.report-title{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:1px;}
.report-close-btn{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);border-radius:8px;padding:8px 16px;
  font-family:var(--sans);font-size:13px;cursor:pointer;
}
.report-close-btn:active{border-color:var(--accent);color:var(--accent);}

/* stats row */
.report-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.r-stat{background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:10px 12px;}
.r-stat-val{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent);}
.r-stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;}

/* report table */
.report-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px;}
.report-table th{text-align:left;padding:7px 8px;font-family:var(--mono);font-size:9px;
  text-transform:uppercase;letter-spacing:1px;color:var(--muted);
  border-bottom:1px solid var(--border);}
.report-table td{padding:8px 8px;border-bottom:1px solid var(--border);color:var(--text);}
.report-table td:nth-child(3),.report-table td:nth-child(4),.report-table td:nth-child(5){
  font-family:var(--mono);font-weight:700;font-size:13px;}
.report-table tr:last-child td{border-bottom:none;}
.cat-badge{
  display:inline-block;font-size:8px;padding:2px 6px;border-radius:99px;
  text-transform:uppercase;letter-spacing:.5px;font-family:var(--mono);
}
.cat-normal{background:rgba(16,185,129,.1);color:#10b981;}
.cat-geno{background:rgba(245,158,11,.1);color:#f59e0b;}
.cat-cyto{background:rgba(239,68,68,.1);color:#ef4444;}

.report-footer{
  background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:12px;font-size:10px;color:var(--muted);font-family:var(--mono);line-height:1.9;
  margin-bottom:16px;
}
.report-export-btn{
  width:100%;padding:16px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--green),#059669);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;
  font-family:var(--sans);margin-bottom:10px;
}
.report-export-btn:active{opacity:.8;}

/* ══════════════════════════════════════
   COMPLETION MODAL
══════════════════════════════════════ */
#doneModal.modal-overlay{align-items:center;justify-content:center;padding:20px;}
.done-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:28px 24px;width:100%;max-width:400px;
  text-align:center;
}
.done-emoji{font-size:52px;margin-bottom:12px;}
.done-title{font-family:var(--mono);font-size:16px;color:var(--accent);
  letter-spacing:1px;margin-bottom:6px;}
.done-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6;}
.done-actions{display:flex;flex-direction:column;gap:10px;}
.done-export{
  padding:16px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--green),#059669);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--sans);
}
.done-export:active{opacity:.8;}
.done-report{
  padding:14px;border-radius:12px;border:1px solid var(--border);
  background:transparent;color:var(--text);font-size:14px;cursor:pointer;font-family:var(--sans);
}
.done-report:active{border-color:var(--accent);color:var(--accent);}
.done-continue{
  padding:12px;border-radius:12px;border:1px solid var(--border);

}
.done-continue:active{color:var(--text);}

/* ── TOAST ── */
.toast{
  position:fixed;top:max(16px, env(safe-area-inset-top));
  left:50%;transform:translateX(-50%) translateY(-8px);
  background:var(--surface2);border:1px solid var(--accent);
  color:var(--accent);padding:10px 18px;border-radius:10px;
  font-family:var(--mono);font-size:12px;z-index:1000;
  opacity:0;transition:all .25s;pointer-events:none;
  white-space:nowrap;max-width:90vw;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{border-color:var(--red);color:var(--red);}
.toast.success{border-color:var(--green);color:var(--green);}

/* ── KEYBOARD BADGE ── */
.kbd-badge{
  position:absolute;top:5px;right:6px;
  min-width:17px;height:17px;padding:0 3px;
  background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.13);
  border-radius:4px;font-family:var(--mono);font-size:9px;font-weight:700;

  border-radius:4px;font-family:var(--mono);font-size:9px;font-weight:700;
  color:rgba(255,255,255,.38);line-height:1;
}

/* ── EXPORT FORMAT MODAL ── */
.export-options{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.export-fmt-btn{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;border-radius:12px;

.export-fmt-btn:active{border-color:var(--accent);color:var(--accent);}

.export-fmt-info{flex:1;}
.export-fmt-name{font-size:14px;font-weight:700;}
.export-fmt-desc{font-size:11px;color:var(--muted);margin-top:2px;}
.export-cancel-btn{

}
.export-cancel-btn:active{color:var(--text);}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}

/* ══════════════════════════════════════
   ACCESIBILIDAD — FOCO VISIBLE (teclado)
══════════════════════════════════════ */
/* Oculta el outline por defecto para mouse/touch,
   pero lo restaura para teclado via :focus-visible */
:focus { outline: none; }
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  box-shadow: 0 0 0 4px rgba(0,212,255,.18);
  border-radius: 4px;
}
input:focus-visible {
  /* Los inputs ya tienen su propio estilo de foco con border+shadow */
  outline: none;
  box-shadow: none;
}

/* ══════════════════════════════════════
   ACCESIBILIDAD — MOVIMIENTO REDUCIDO
══════════════════════════════════════ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* ══════════════════════════════════════

══════════════════════════════════════ */
/* Milestone labels: 8px → 10px */
.ms { font-size: 10px; }
/* Top bar stat label: 9px → 11px */
.top-stat-lbl { font-size: 11px; }
/* Bottom bar button label: 9px → 10px */
.bar-btn-label { font-size: 10px; }
/* Pane card tag (era 5px — ilegible): → 9px */
.pane .cell-btn-tag { font-size: 9px; }
/* cols-3 card tag: 7px → 9px */

/* cols-2 card tag: 8px → 9px */
.cols-2 .cell-btn-tag { font-size: 9px; }
/* Category badge en reporte: 8px → 10px */
.cat-badge { font-size: 10px; }
/* Report table header: 9px → 10px */
.report-table th { font-size: 10px; }

/* ══════════════════════════════════════
   LEGIBILIDAD — CONTRASTE KBD BADGE
   rgba(255,255,255,.38) ≈ 2.5:1 → falla WCAG AA
   .55 ≈ 4:1 — pasa para texto pequeño en contexto UI
══════════════════════════════════════ */
.kbd-badge, .mn-kbd-badge {

/* ══════════════════════════════════════

══════════════════════════════════════ */

// ═══════════════════════════════════════
function saveState() {
  try { localStorage.setItem('bmcyt_v7', JSON.stringify({lang, state})); } catch(e){}
}
function loadSaved() {
  try {
    const raw = localStorage.getItem('bmcyt_v7');
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e){ return null; }
}
function clearSaved() {
  try { localStorage.removeItem('bmcyt_v7'); } catch(e){}
}

function renderSetupActions(saved) {
  const u = UI[lang];
  const actions = g('setupActions');
  const importBtn = `<button class="btn-import" onclick="openImportFile()">📂 ${u.importSession}</button>`;
  if (saved && getCountFromSaved(saved) > 0) {
    actions.innerHTML = `
      <button class="btn-resume" onclick="resumeSession()">${u.resumeSession}</button>
      <button class="btn-start"  onclick="startNewSession()">${u.startNew}</button>
      ${importBtn}`;
  } else {
    actions.innerHTML = `
      <button class="btn-start" onclick="startNewSession()">${u.startNew}</button>
      ${importBtn}`;
  }
}

function getCountFromSaved(saved) {
  if (!saved || !saved.state || !saved.state.cells) return 0;
  return Object.values(saved.state.cells).reduce((s,v)=>s+v,0);
}

function renderResumeBanner(saved) {
  const banner = g('resumeBanner');
  const info = g('resumeInfo');
  const u = UI[lang];
  const total = getCountFromSaved(saved);
  const s = saved.state;
  if (total > 0) {
    g('resumeTitle').textContent = u.resumeTitle;
    const pct = (total/GOAL*100).toFixed(1);
    info.textContent = `${s.participantId || '—'} · Muestra ${s.sampleNumber || '—'} · ${total}/${GOAL} (${pct}%)`;
    banner.style.display = 'block';
  } else {
    banner.style.display = 'none';
  }
}

function startNewSession() {
  const pid = g('inpParticipant').value.trim();
  if (!pid) {
    g('inpParticipant').focus();
    g('inpParticipant').style.borderColor = 'var(--red)';
    setTimeout(() => g('inpParticipant').style.borderColor = '', 1500);
    showToast(lang==='es'?'Ingresa el ID del participante':'Enter participant ID','error');
    return;
  }
  clearSaved();
  CELL_DEFS.forEach(d => state.cells[d.key] = 0);
  state.history = [];
  state.goalShown = false;
  state.participantId = pid;
  state.sampleNumber = g('inpSample').value.trim();
  state.startTime = new Date().toISOString();
  saveState();
  launchCounter();
}

function resumeSession() {
  const saved = loadSaved();
  if (!saved) return;
  lang = saved.lang || 'es';
  state = saved.state;
  // ensure all cell keys exist
  CELL_DEFS.forEach(d => { if(state.cells[d.key]==null) state.cells[d.key]=0; });
  if (!state.history) state.history = [];
  if (state.mnExtra == null) state.mnExtra = 0;
  g('inpParticipant').value = state.participantId || '';
  g('inpSample').value = state.sampleNumber || '';
  launchCounter();
}

function launchCounter() {
  showScreen('scCounter');
  renderCounter();
  updateProgress();
  updateCounterLabels();
  renderVoiceChips();
  g('topParticipant').textContent = state.participantId + (state.sampleNumber ? ' · M'+state.sampleNumber : '');
}

function openEditParticipant() {
  showScreen('scSetup');
  const saved = loadSaved();
  g('inpParticipant').value = state.participantId;
  g('inpSample').value = state.sampleNumber;
  renderSetupLabels();
  if (saved && getCountFromSaved(saved) > 0) {
    g('setupActions').innerHTML = `
      <button class="btn-resume" onclick="applyEditParticipant()">${lang==='es'?'Actualizar y volver':'Update and go back'}</button>
      <button class="btn-new" onclick="confirmFullReset()">${UI[lang].newSession}</button>`;
  }
}

function applyEditParticipant() {
  const pid = g('inpParticipant').value.trim();
  if (!pid) { g('inpParticipant').focus(); return; }
  state.participantId = pid;
  state.sampleNumber = g('inpSample').value.trim();
  saveState();
  launchCounter();
}

function confirmFullReset() {
  if (confirm(UI[lang].confirmReset)) {
    clearSaved();
    CELL_DEFS.forEach(d => state.cells[d.key] = 0);
    state.history = []; state.goalShown = false;
    state.participantId = ''; state.sampleNumber = '';
    g('inpParticipant').value = ''; g('inpSample').value = '';
    renderSetupLabels();
    showToast(UI[lang].notifReset);
  }
}

function renderPane(pane) {

         <div class="section-dot"></div>${pane.lbl[lang]||pane.lbl.es}

    const label = lang==='es' ? d.labelEs : d.labelEn;
    const kbdKey = CELL_TO_KEY[key] || '?';
    if (key==='micronucleo') {
      const mnExtraLbl = lang==='es' ? 'MN extra' : 'Extra MN';
      const mnCellsLbl = lang==='es' ? 'cél.' : 'cells';
      const totalMN = state.cells.micronucleo + (state.mnExtra||0);
      return `
      <div class="cell-btn" style="--cc:${d.color}" data-key="micronucleo" ontouchstart="" onclick="addCellBtn(event,'micronucleo')">
        <span class="kbd-badge kbd-badge-left">${kbdKey}</span>
        <div class="cell-btn-body" style="flex-direction:row;align-items:center;gap:8px;justify-content:space-between;">
          <div style="padding-left:20px"><div class="cell-btn-name">${label}</div></div>
          <div class="cell-btn-count mn-cell-count" id="cnt-micronucleo">${state.cells.micronucleo}</div>
        </div>
        <button class="cell-btn-minus" onclick="removeCellBtn(event,'micronucleo')">−</button>
        <div class="mn-extra-row" onclick="event.stopPropagation()">
          <span class="mn-extra-label">${mnExtraLbl}</span>
          <span class="mn-kbd-badge">${CELL_TO_KEY['__mnExtra']}</span>
          <span class="mn-extra-val" id="mnExtraVal">${state.mnExtra||0}</span>
          <button class="mn-extra-btn" onclick="addMNExtra()">＋</button>
          <button class="mn-extra-btn" onclick="removeMNExtra()">−</button>
        </div>
        <div class="mn-total-row" onclick="event.stopPropagation()">
          Total: <span>${totalMN}</span>&nbsp;·&nbsp;${state.cells.micronucleo} ${mnCellsLbl}+${state.mnExtra||0}
        </div>
      </div>`;
    }
    return `
    <div class="cell-btn" style="--cc:${d.color}" data-key="${key}" ontouchstart="" onclick="addCellBtn(event,'${key}')">
      <span class="kbd-badge">${kbdKey}</span>
      <div class="cell-btn-body">
        <div class="cell-btn-name">${label}</div>
        <div class="cell-btn-count" id="cnt-${key}">${state.cells[key]}</div>
      </div>
      <button class="cell-btn-minus" onclick="removeCellBtn(event,'${key}')">−</button>
    </div>`;
  }).join('');
  return `<div class="pane">${labelHtml}${cards}</div>`;
}

function renderCounter() {
  const scroll = g('cellsScroll');
  scroll.innerHTML = SECTIONS.map(sec => {
    if (sec.threePanes) {
      return `<div class="three-pane">${renderPane(sec.left)}${renderPane(sec.middle)}${renderPane(sec.right)}</div>`;
    }
    if (sec.twoPanes) {
      const rightHtml = sec.right.stack
        ? `<div style="flex:1;display:flex;flex-direction:column;gap:8px;">${sec.right.stack.map(s=>renderPane(s)).join('')}</div>`
        : renderPane(sec.right);
      return `<div class="two-pane">${renderPane(sec.left)}${rightHtml}</div>`;
    }
    const labelHtml = sec.lbl
      ? `<div class="section-lbl" style="--section-color:${sec.color}">
           <div class="section-dot"></div>${sec.lbl[lang]||sec.lbl.es}
         </div>`
      : '';
    const grid = sec.keys.map(key => {
      const d = CELL_DEFS.find(x => x.key===key);
      const label = lang==='es' ? d.labelEs : d.labelEn;
      const kbdKey = CELL_TO_KEY[key] || '?';
      return `
      <div class="cell-btn" style="--cc:${d.color}" data-key="${key}" ontouchstart="" onclick="addCellBtn(event,'${key}')">
        <span class="kbd-badge">${kbdKey}</span>
        <div class="cell-btn-body">
          <div class="cell-btn-name">${label}</div>
          <div class="cell-btn-count" id="cnt-${key}">${state.cells[key]}</div>
        </div>
        <button class="cell-btn-minus" onclick="removeCellBtn(event,'${key}')">−</button>
      </div>`;
    }).join('');
    return labelHtml + `<div class="cell-grid cols-${sec.cols}">${grid}</div>`;
  }).join('');
}

// ═══════════════════════════════════════
// COUNTER CORE
// ═══════════════════════════════════════
function addCellBtn(event, key) {
  addCell(key);
}
function removeCellBtn(event, key) {
  event.stopPropagation();
  removeCell(key);
}

let _tapLock = {};
function addCell(key) {
  if (_tapLock[key]) return;
  _tapLock[key] = true;
  setTimeout(() => delete _tapLock[key], 120);

  const total = getTotal();
  if (total >= GOAL) {
    showToast(UI[lang].notifGoal, 'success');
    return;
  }
  state.cells[key]++;
  state.history.push({key, a:'add'});
  vibrate(22);
  refreshCount(key);
  updateProgress();
  flashCard(key);
  saveState();
  checkGoal();
}

function removeCell(key) {
  if (state.cells[key] > 0) {
    state.cells[key]--;
    state.history.push({key, a:'sub'});
    vibrate(15);
    refreshCount(key);
    updateProgress();
    saveState();
  }
}

function addMNExtra() {
  state.mnExtra = (state.mnExtra||0) + 1;
  state.history.push({key:'__mnExtra', a:'add'});
  vibrate(18);
  refreshMNExtra();
  saveState();
}

function removeMNExtra() {
  if ((state.mnExtra||0) <= 0) return;
  state.mnExtra--;
  state.history.push({key:'__mnExtra', a:'sub'});
  vibrate(15);
  refreshMNExtra();
  saveState();
}

function refreshMNExtra() {
  const ve = g('mnExtraVal');
  if (ve) ve.textContent = state.mnExtra||0;
  // Update total MN display
  const totalEl = document.querySelector('.mn-total-row');
  if (totalEl) {
    const totalMN = state.cells.micronucleo + (state.mnExtra||0);
    const mnCellsLbl = lang==='es' ? 'células MN' : 'MN cells';
    const mnTotalLbl = lang==='es' ? 'Total MN' : 'Total MN';
    totalEl.innerHTML = `${mnTotalLbl}: <span>${totalMN}</span>&nbsp;·&nbsp;${state.cells.micronucleo} ${mnCellsLbl} + ${state.mnExtra||0} extra`;
  }
}

function undoLast() {
  if (!state.history.length) {
    showToast(UI[lang].notifNoUndo, 'error');
    vibrate([10,50,10]);
    return;
  }
  const last = state.history.pop();
  vibrate(30);

  // MN extra undo
  if (last.key === '__mnExtra') {
    if (last.a==='add') state.mnExtra = Math.max(0,(state.mnExtra||0)-1);
    else state.mnExtra = (state.mnExtra||0)+1;
    refreshMNExtra();
    saveState();
    showToast(UI[lang].notifUndo + (lang==='es'?'MN extra':'extra MN'));
    return;
  }

  // Regular cell undo
  if (last.a==='add') state.cells[last.key] = Math.max(0, state.cells[last.key]-1);
  else state.cells[last.key]++;
  refreshCount(last.key);
  // If undoing a MN cell, also update the MN total display
  if (last.key==='micronucleo') refreshMNExtra();
  updateProgress();
  saveState();
  const def = CELL_DEFS.find(d=>d.key===last.key);
  const label = lang==='es' ? def.labelEs : def.labelEn;
  showToast(UI[lang].notifUndo + label);
}

function confirmReset() {
  if (confirm(UI[lang].confirmReset)) {
    CELL_DEFS.forEach(d => state.cells[d.key]=0);
    state.history = [];
    state.goalShown = false;
    renderCounter();
    updateProgress();
    saveState();
    showToast(UI[lang].notifReset);
  }
}

function checkGoal() {
  if (getTotal()===GOAL && !state.goalShown) {
    state.goalShown = true;
    setTimeout(() => openDone(), 400);
  }
}

// ═══════════════════════════════════════
// PROGRESS & UI UPDATE
// ═══════════════════════════════════════
function refreshCount(key) {
  const el = g('cnt-'+key);
  if (el) el.textContent = state.cells[key];
  if (key==='micronucleo') refreshMNExtra();
}

function updateProgress() {
  const total = getTotal();
  const pct = Math.min(100, total/GOAL*100);
  const remain = Math.max(0, GOAL-total);
  g('topTotal').textContent   = total;
  g('topRemain').textContent  = remain;
  g('progressFill').style.width = pct+'%';
  [500,1000,1500,2000].forEach((m,i,arr)=>{
    const el = g('ms'+m);
    if (!el) return;
    if (total>=m) el.className='ms reached';
    else if (total>=(arr[i-1]||0)) el.className='ms active';
    else el.className='ms';
  });
}

function flashCard(key) {
  const card = document.querySelector(`[data-key="${key}"]`);
  if (!card) return;
  card.classList.add('flash');
  setTimeout(() => card.classList.remove('flash'), 240);
}

  const t = g('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type?' '+type:'');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className='toast', 2600);
}

  g('voiceWrap').className = 'voice-input-wrap';

  setTimeout(() => g('voiceInput').focus(), 300);
}

function closeVoice() {
  g('voiceModal').classList.remove('open');

}

function clearVoice() {
  clearTimeout(voiceTimer);
  voiceCooldown = false;
  g('voiceInput').value = '';

  g('voiceWrap').className = 'voice-input-wrap';
}

function renderVoiceChips() {
  const u = UI[lang];
  g('voiceChips').innerHTML =

      `<span class="vchip" onclick="addCell('${CHIP_KEYS[i]}');closeVoice()">${label}</span>`
    ).join('');
}

g('voiceInput').addEventListener('input', () => {
  if (voiceCooldown) { g('voiceInput').value=''; return; }
  clearTimeout(voiceTimer);
  const text = g('voiceInput').value.trim();
  if (!text) return;
  voiceTimer = setTimeout(() => triggerVoice(), 650);
});

g('voiceInput').addEventListener('keydown', e => {
  if (e.key==='Enter') { clearTimeout(voiceTimer); triggerVoice(); e.preventDefault(); }
});

function triggerVoice() {
  const text = g('voiceInput').value.trim();
  if (!text) return;
  processVoice(text);
  voiceCooldown = true;
  g('voiceInput').value = '';
  setTimeout(() => { voiceCooldown=false; }, 400);
}

function matchWord(word, map) {
  for (const entry of map) {
    for (const trigger of entry.w) {
      const t = norm(trigger);
      if (word===t) return entry.k;
      if (word.startsWith(t) && t.length>=3) return entry.k;
      if (t.startsWith(word) && word.length>=3) return entry.k;
    }
  }
  return null;
}

function processVoice(text) {
  const u = UI[lang];
  const pMap = lang==='es' ? CMD_ES : CMD_EN;
  const fMap = lang==='es' ? CMD_EN : CMD_ES;
  const words = norm(text).split(/[\s,;.:!?()\-]+/).filter(Boolean);

  if (words.some(w => u.undoWords.includes(w))) {
    undoLast(); setVoiceFeedback('↩','ok'); return;
  }

  let count=0, lastLabel='';
  for (const word of words) {
    const matched = matchWord(word,pMap) || matchWord(word,fMap);
    if (matched) {
      addCell(matched); count++;
      const def = CELL_DEFS.find(d=>d.key===matched);
      lastLabel = lang==='es' ? def.labelEs : def.labelEn;
    }
  }
  if (count===1) setVoiceFeedback(u.feedbackOk+lastLabel, 'ok');
  else if (count>1) setVoiceFeedback('✓ '+count+u.feedbackMulti, 'ok');
  else setVoiceFeedback(u.feedbackErr+'"'+text+'"', 'err');
}

function setVoiceFeedback(msg, type) {
  const st = g('voiceStatus');
  const wr = g('voiceWrap');
  st.textContent = msg;
  st.className   = 'voice-status ' + (type||'');
  wr.className   = 'voice-input-wrap ' + (type==='ok'?'matched':type==='err'?'no-match':'');
  clearTimeout(wr._t);
  wr._t = setTimeout(() => {
    wr.className = 'voice-input-wrap';
    st.textContent='—'; st.className='voice-status';
  }, 2000);
}

  const death = state.cells.cromatina+state.cells.cariorrexis+state.cells.picnosis+state.cells.cariolisis;

    <div class="r-stat"><div class="r-stat-val">${total}</div><div class="r-stat-lbl">${u.rTotal}</div></div>

    <div class="r-stat"><div class="r-stat-val">${mnPerCell}</div><div class="r-stat-lbl">${lang==='es'?'MN / célula MN':'MN / MN cell'}</div></div>
    <div class="r-stat"><div class="r-stat-val">${mncf}</div><div class="r-stat-lbl">${lang==='es'?'Frec. células MN / 1000':'MNCF / 1000'}</div></div>
    <div class="r-stat"><div class="r-stat-val">${mnf}</div><div class="r-stat-lbl">${lang==='es'?'Frec. MN totales / 1000':'MNF / 1000'}</div></div>
    <div class="r-stat"><div class="r-stat-val">${nF}</div><div class="r-stat-lbl">${u.rNBUDF}/1000</div></div>
    <div class="r-stat"><div class="r-stat-val">${death}</div><div class="r-stat-lbl">${lang==='es'?'Muerte celular':'Cell death'}</div></div>`;

  // table
  g('reportBody').innerHTML = CELL_DEFS.map(d => {
    const label = lang==='es' ? d.labelEs : d.labelEn;
    const cat   = lang==='es' ? d.catEs   : d.catEn;
    const pct   = total>0 ? (state.cells[d.key]/total*100).toFixed(2) : '0.00';
    const p1k   = total>0 ? (state.cells[d.key]/total*1000).toFixed(2) : '0.00';
    return `<tr>
      <td><span class="cat-badge ${d.catClass}">${cat}</span></td>
      <td>${label}</td>
      <td>${state.cells[d.key]}</td>
      <td>${pct}%</td>
      <td>${p1k}</td>

  }).join('');

  g('reportFooter').innerHTML =
    `${u.rTotal}: ${total}/${GOAL} | Células MN: ${mnCells} | MN extra: ${mnExtra} | MN totales: ${totalMN}<br>`+
    `MNCF/1000: ${mncf} | MNF/1000: ${mnf} | ${u.rNBUDF}: ${nF}/1000<br>`+
    `${u.rDeath}: ${death} | ${u.rDate}: ${new Date().toLocaleString(lang==='es'?'es-MX':'en-US')}<br>`+
    `${u.rProto}: BMCyt HUMNxl — Bolognesi et al. 2013 · Thomas et al. 2009`;

}

function exportCSV() {
  const total = getTotal();
  const now   = new Date();

  csv += `#Participant,${state.participantId}\n`;
  csv += `#Sample,${state.sampleNumber||''}\n`;
  csv += `#Date,${now.toISOString()}\n`;
  csv += `#Protocol,HUMNxl Bolognesi 2013\n`;
  csv += `#Goal,${GOAL}\n#Lang,${lang}\n\n`;
  csv += 'key,label_es,label_en,category_es,category_en,count,pct,per_1000\n';

  const mnCells = state.cells.micronucleo;
  const mnExtra = state.mnExtra || 0;
  const totalMN = mnCells + mnExtra;
  const diff = state.cells.diferenciada + mnCells + state.cells.nbud + state.cells.binucleada;
  const mncf = diff>0?(mnCells/diff*1000).toFixed(2):'N/A';
  const mnf  = diff>0?(totalMN/diff*1000).toFixed(2):'N/A';
  const nF   = diff>0?(state.cells.nbud/diff*1000).toFixed(2):'N/A';
  CELL_DEFS.forEach(d => {
    const pct = total>0 ? (state.cells[d.key]/total*100).toFixed(2) : '0.00';
    const p1k = total>0 ? (state.cells[d.key]/total*1000).toFixed(2) : '0.00';
    csv += `${d.key},${d.labelEs},${d.labelEn},${d.catEs},${d.catEn},${state.cells[d.key]},${pct},${p1k}\n`;
  });
  csv += `\n#TOTAL,${total},,,,${total},,\n`;
  csv += `#MN_CELLS,${mnCells}\n`;
  csv += `#MN_EXTRA,${mnExtra}\n`;
  csv += `#MN_TOTAL,${totalMN}\n`;
  csv += `#MNCF_PER_1000,${mncf}\n`;
  csv += `#MNF_PER_1000,${mnf}\n`;
  csv += `#NBUD_FREQ_PER_1000,${nF}\n`;

  const ds = now.toISOString().replace(/[:.]/g,'-').slice(0,16);
  const pid = state.participantId.replace(/[^a-zA-Z0-9_-]/g,'_');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download = `BMCyt_${pid}_${ds}.csv`;
  a.click();
  showToast(UI[lang].notifExport, 'success');
}

function exportXLSX() {
  if (typeof XLSX === 'undefined') {
    showToast(lang==='es'?'SheetJS no disponible, usando CSV':'SheetJS unavailable, using CSV','error');
    exportCSV(); return;
  }
  const total  = getTotal();
  const now    = new Date();
  const mnCells = state.cells.micronucleo;
  const mnExtra = state.mnExtra || 0;
  const totalMN = mnCells + mnExtra;
  const diff    = state.cells.diferenciada + mnCells + state.cells.nbud + state.cells.binucleada;
  const mncf = diff>0?(mnCells/diff*1000).toFixed(2):'N/A';
  const mnf  = diff>0?(totalMN/diff*1000).toFixed(2):'N/A';
  const nF   = diff>0?(state.cells.nbud/diff*1000).toFixed(2):'N/A';
  const death= state.cells.cromatina+state.cells.cariorrexis+state.cells.picnosis+state.cells.cariolisis;

  const header = lang==='es'
    ? ['Clave','Célula','Categoría','N','%','/1000']
    : ['Key','Cell type','Category','N','%','/1000'];

  const rows = [
    [lang==='es'?'Participante':'Participant', state.participantId],
    [lang==='es'?'Muestra':'Sample',           state.sampleNumber||''],
    [lang==='es'?'Fecha':'Date',               now.toLocaleString(lang==='es'?'es-MX':'en-US')],
    ['Protocolo','HUMNxl — Bolognesi et al. 2013'],
    [],
    header,
    ...CELL_DEFS.map(d => {
      const label = lang==='es' ? d.labelEs : d.labelEn;
      const cat   = lang==='es' ? d.catEs   : d.catEn;
      const pct = total>0 ? parseFloat((state.cells[d.key]/total*100).toFixed(2)) : 0;
      const p1k = total>0 ? parseFloat((state.cells[d.key]/total*1000).toFixed(2)) : 0;
      return [d.key, label, cat, state.cells[d.key], pct, p1k];
    }),
    [],
    [lang==='es'?'Total':'Total', '', '', total],
    ['MN células/cells', '', '', mnCells],
    ['MN extra', '', '', mnExtra],
    ['MN total', '', '', totalMN],
    ['MNCF/1000', '', '', mncf],
    ['MNF/1000', '', '', mnf],
    [`${lang==='es'?'Frec. NBUD':'NBUD freq.'}/1000`, '', '', nF],
    [lang==='es'?'Muerte celular':'Cell death', '', '', death],
  ];

  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:20},{wch:24},{wch:14},{wch:8},{wch:8},{wch:8}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'BMCyt');
  const ds  = now.toISOString().replace(/[:.]/g,'-').slice(0,16);
  const pid = state.participantId.replace(/[^a-zA-Z0-9_-]/g,'_');
  XLSX.writeFile(wb, `BMCyt_${pid}_${ds}.xlsx`);
  showToast(UI[lang].notifExport, 'success');
}

// ═══════════════════════════════════════
// SESSION IMPORT (CSV / XLSX)
// ═══════════════════════════════════════
function openImportFile() {
  g('importFileInput').value = '';
  g('importFileInput').click();
}

function handleImportFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const name = file.name.toLowerCase();
  if (name.endsWith('.xlsx')) {
    if (typeof XLSX === 'undefined') {
      showToast(lang==='es'?'SheetJS no disponible, usa CSV':'SheetJS unavailable, use CSV','error');
      return;
    }
    const reader = new FileReader();
    reader.onload = ev => {
      try { parseImportedXLSX(ev.target.result); }
      catch(_) { showToast(UI[lang].importInvalid,'error'); }
    };
    reader.readAsArrayBuffer(file);
  } else if (name.endsWith('.csv')) {
    const reader = new FileReader();
    reader.onload = ev => {
      try { parseImportedCSV(ev.target.result); }
      catch(_) { showToast(UI[lang].importInvalid,'error'); }
    };
    reader.readAsText(file,'utf-8');
  } else {
    showToast(UI[lang].importInvalid,'error');
  }
}

function applyImportedSession(imported) {
  const hasData = CELL_DEFS.some(d => (imported.cells[d.key]||0) > 0);
  if (!hasData) { showToast(UI[lang].importInvalid,'error'); return; }
  if (imported.lang) lang = imported.lang;
  state.participantId = imported.participantId || '';
  state.sampleNumber  = imported.sampleNumber  || '';
  state.cells = {};
  CELL_DEFS.forEach(d => state.cells[d.key] = imported.cells[d.key] || 0);
  state.mnExtra   = imported.mnExtra   || 0;
  state.history   = [];
  state.goalShown = false;
  state.startTime = new Date().toISOString();
  g('inpParticipant').value = state.participantId;
  g('inpSample').value      = state.sampleNumber;
  saveState();
  showToast(UI[lang].importSuccess,'success');
  setTimeout(() => launchCounter(), 500);
}

function parseImportedCSV(text) {
  const lines = text.split(/\r?\n/);
  const imported = { participantId:'', sampleNumber:'', cells:{}, mnExtra:0, lang:null };
  CELL_DEFS.forEach(d => imported.cells[d.key] = 0);
  let inData = false;
  for (const raw of lines) {
    const line = raw.trim();
    if (!line) continue;
    if (line.startsWith('#Participant,')) { imported.participantId = line.slice(13); continue; }
    if (line.startsWith('#Sample,'))      { imported.sampleNumber  = line.slice(8);  continue; }
    if (line.startsWith('#Lang,'))        { imported.lang          = line.slice(6);  continue; }
    if (line.startsWith('#MN_EXTRA,'))    { imported.mnExtra = parseInt(line.slice(10))||0; continue; }
    if (line.startsWith('#')) continue;
    if (line.startsWith('key,')) { inData = true; continue; }
    if (!inData) continue;
    const cols = line.split(',');
    const key = cols[0];
    if (CELL_DEFS.find(d => d.key===key)) imported.cells[key] = parseInt(cols[5])||0;
  }
  applyImportedSession(imported);
}

function parseImportedXLSX(buffer) {
  const wb   = XLSX.read(buffer, {type:'array'});
  const ws   = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
  const imported = { participantId:'', sampleNumber:'', cells:{}, mnExtra:0, lang:null };
  CELL_DEFS.forEach(d => imported.cells[d.key] = 0);
  for (const row of rows) {
    const c0 = String(row[0]||'').trim();
    const c1 = String(row[1]||'').trim();
    const c3 = row[3];
    if (c0==='Participante'||c0==='Participant') { imported.participantId = c1; continue; }
    if (c0==='Muestra'||c0==='Sample')           { imported.sampleNumber  = c1; continue; }
    if (CELL_DEFS.find(d => d.key===c0))         { imported.cells[c0] = parseInt(c3)||0; continue; }
    if (c0==='MN extra')                         { imported.mnExtra = parseInt(c3)||0; continue; }
  }
  applyImportedSession(imported);
}

// ═══════════════════════════════════════
// KEYBOARD SHORTCUTS (desktop / BT keyboards)
// ═══════════════════════════════════════

// Teclado español 
const KEY_MAP_ES = {' ':'diferenciada','a':'basal','s':'micronucleo','d':'nbud',
                    'f':'binucleada','j':'cromatina','k':'cariorrexis','l':'picnosis','ñ/;':'cariolisis'};

// Teclado inglés 
const KEY_MAP_EN = {' ':'diferenciada','a':'basal','s':'micronucleo','d':'nbud',
                    'f':'binucleada','j':'cromatina','k':'cariorrexis','l':'picnosis',';':'cariolisis'};

// Alias activo según el idioma seleccionado (lang se define en init())
const KEY_MAP = KEY_MAP_ES; // fallback; el listener usa activeKeyMap() en tiempo real

const activeKeyMap = () => lang === 'en' ? KEY_MAP_EN : KEY_MAP_ES;

// Reverse mapping para mostrar la letra en las tarjetas (basado en el mapa activo al cargar)
const CELL_TO_KEY = Object.entries(KEY_MAP_ES).reduce((acc, [k, v]) => {
  const displayKey = k === ' ' ? 'SPACE' : k.toUpperCase();
  acc[v] = displayKey;
  return acc;
}, {});
CELL_TO_KEY['__mnExtra'] = 'Q';

document.addEventListener('keydown', e => {
  if (!g('scCounter').classList.contains('active')) return;
  if (e.target===g('voiceInput')) return;
  if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if ((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='z'){ e.preventDefault(); undoLast(); return; }
  if (e.ctrlKey||e.metaKey||e.altKey) return;
  const k = e.key.toLowerCase();
  if (activeKeyMap()[k]){ addCell(activeKeyMap()[k]); return; } // usa el mapa del idioma activo
  if (k==='q'){ addMNExtra(); return; }
  if (k==='z') undoLast();
});
