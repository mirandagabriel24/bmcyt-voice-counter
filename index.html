<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e14">
<title>BMCyt Counter</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --bg:#0a0e14; --surface:#111720; --surface2:#1a2233; --border:#1e2d45;
  --accent:#00d4ff; --accent2:#7c3aed; --green:#10b981; --yellow:#f59e0b;
  --red:#ef4444; --text:#e2e8f0; --muted:#64748b;
  --mono:'Space Mono',monospace; --sans:'DM Sans',sans-serif;
  --radius:14px; --bar-h:60px; --top-h:112px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);
  overflow-x:hidden;-webkit-font-smoothing:antialiased;}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;min-height:100vh;min-height:100dvh;}
.screen.active{display:flex;}

/* ══════════════════════════════════════
   SETUP SCREEN
══════════════════════════════════════ */
#scSetup{
  align-items:center;justify-content:center;
  padding:24px 20px env(safe-area-inset-bottom,20px);
  background:var(--bg);
}
.setup-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:28px 24px;width:100%;max-width:420px;
}
.setup-logo{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.setup-logo-icon{
  width:44px;height:44px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.setup-logo-text h1{font-family:var(--mono);font-size:15px;color:var(--accent);
  letter-spacing:2px;text-transform:uppercase;}
.setup-logo-text p{font-size:10px;color:var(--muted);letter-spacing:.5px;margin-top:2px;}

.lang-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);
  border-radius:9px;padding:3px;gap:3px;margin-left:auto;}
.lang-btn{padding:6px 14px;border-radius:6px;border:none;background:transparent;
  color:var(--muted);font-family:var(--mono);font-size:11px;font-weight:700;
  cursor:pointer;transition:all .2s;letter-spacing:1px;}
.lang-btn.active{background:var(--accent);color:#000;}

.resume-banner{
  background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.25);
  border-radius:10px;padding:12px 14px;margin-bottom:20px;
  font-size:12px;color:var(--accent);line-height:1.6;
}
.resume-banner strong{display:block;font-size:13px;margin-bottom:4px;}

.form-group{margin-bottom:16px;}
.form-label{font-size:11px;color:var(--muted);text-transform:uppercase;
  letter-spacing:.8px;font-family:var(--mono);margin-bottom:6px;display:block;}
.form-label span{color:var(--red);}
.form-input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:14px 16px;color:var(--text);
  font-family:var(--sans);font-size:16px;outline:none;transition:border-color .2s;
}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.1);}
.form-input::placeholder{color:var(--muted);}

.setup-actions{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
.btn-start{
  padding:16px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;font-family:var(--sans);font-size:16px;font-weight:700;
  cursor:pointer;transition:opacity .15s;letter-spacing:.3px;
}
.btn-start:active{opacity:.8;}
.btn-resume{
  padding:14px;border-radius:12px;border:1px solid var(--accent);
  background:transparent;color:var(--accent);font-family:var(--sans);
  font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;
}
.btn-resume:active{background:rgba(0,212,255,.1);}
.btn-new{
  padding:12px;border-radius:12px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-family:var(--sans);
  font-size:14px;cursor:pointer;transition:all .15s;
}
.btn-new:active{color:var(--red);border-color:var(--red);}

/* ══════════════════════════════════════
   COUNTER SCREEN
══════════════════════════════════════ */
#scCounter{background:var(--bg);}

/* ── TOP BAR ── */
.top-bar{
  position:sticky;top:0;z-index:100;
  background:var(--bg);
  padding:env(safe-area-inset-top,0) 0 0;
}
.top-bar-inner{
  padding:10px 16px 0;
  border-bottom:1px solid var(--border);
}
.top-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;}
.top-logo{display:flex;align-items:center;gap:8px;}
.top-logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.top-logo-label{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:1.5px;}
.top-participant{
  font-size:11px;color:var(--muted);font-family:var(--mono);
  background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;padding:3px 8px;cursor:pointer;max-width:140px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.top-stats{display:flex;gap:16px;}
.top-stat{text-align:right;}
.top-stat-val{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent);line-height:1;}
.top-stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}

/* progress */
.progress-wrap{padding:8px 16px 10px;}
.progress-track{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:99px;transition:width .35s ease;width:0%;}
.milestones{display:flex;gap:4px;margin-top:5px;}
.ms{flex:1;text-align:center;font-size:8px;color:var(--muted);font-family:var(--mono);
  padding:2px;border-radius:3px;border:1px solid transparent;transition:all .3s;}
.ms.reached{color:var(--accent);border-color:var(--accent);background:rgba(0,212,255,.08);}
.ms.active{color:var(--yellow);border-color:var(--yellow);background:rgba(245,158,11,.1);animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* ── CELLS SCROLL AREA ── */
.cells-scroll{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:12px 14px calc(var(--bar-h) + env(safe-area-inset-bottom,12px) + 12px);
}

/* ── SECTION LABEL ── */
.section-lbl{
  font-size:9px;text-transform:uppercase;letter-spacing:2px;
  color:var(--muted);font-family:var(--mono);
  padding:4px 2px 6px;margin-top:10px;
  border-bottom:1px solid var(--border);margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}
.section-lbl:first-child{margin-top:0;}
.section-dot{width:6px;height:6px;border-radius:50%;background:var(--section-color,var(--muted));flex-shrink:0;}

/* ── CELL GRID ── */
.cell-grid{display:grid;gap:8px;margin-bottom:4px;}
.cell-grid.cols-2{grid-template-columns:1fr 1fr;}
.cell-grid.cols-3{grid-template-columns:1fr 1fr 1fr;}

/* ── CELL BUTTON ── */
.cell-btn{
  --cc:var(--accent);
  background:var(--surface);border:1px solid var(--border);
  border-top:3px solid var(--cc);
  border-radius:var(--radius);
  display:flex;flex-direction:column;
  align-items:stretch;
  cursor:pointer;user-select:none;touch-action:manipulation;
  position:relative;overflow:hidden;
  transition:background .1s, border-color .1s;
  -webkit-user-select:none;
}
.cell-btn:active{background:var(--surface2);border-color:var(--cc);}
.cell-btn.flash{animation:btnFlash .22s ease;}
@keyframes btnFlash{
  0%{transform:scale(1)}
  40%{transform:scale(.95);background:rgba(255,255,255,.06)}
  100%{transform:scale(1)}
}

/* Wide card (cols-2) */
.cols-2 .cell-btn{min-height:90px;}
.cols-2 .cell-btn-body{
  flex:1;display:flex;flex-direction:column;
  justify-content:space-between;padding:10px 12px 6px;
}
.cols-2 .cell-btn-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.3;}
.cols-2 .cell-btn-tag{font-size:8px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
.cols-2 .cell-btn-count{
  font-family:var(--mono);font-size:40px;font-weight:700;
  color:var(--cc);line-height:1;margin:4px 0 8px;
}
.cols-2 .cell-btn-minus{
  border-top:1px solid var(--border);
  padding:8px;text-align:center;
  font-size:18px;color:var(--muted);font-family:var(--mono);
  background:transparent;border:none;border-top:1px solid var(--border);
  cursor:pointer;touch-action:manipulation;width:100%;
  min-height:40px;display:flex;align-items:center;justify-content:center;
}
.cols-2 .cell-btn-minus:active{background:rgba(239,68,68,.12);color:var(--red);}

/* Narrow card (cols-3) */
.cols-3 .cell-btn{min-height:100px;}
.cols-3 .cell-btn-body{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:8px 6px 4px;text-align:center;
}
.cols-3 .cell-btn-name{font-size:10px;font-weight:700;color:var(--text);line-height:1.3;}
.cols-3 .cell-btn-tag{font-size:7px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.3px;}
.cols-3 .cell-btn-count{
  font-family:var(--mono);font-size:32px;font-weight:700;
  color:var(--cc);line-height:1;margin:6px 0 6px;
}
.cols-3 .cell-btn-minus{
  border-top:1px solid var(--border);
  padding:6px;text-align:center;
  font-size:18px;color:var(--muted);
  background:transparent;border:none;border-top:1px solid var(--border);
  cursor:pointer;touch-action:manipulation;width:100%;
  min-height:36px;display:flex;align-items:center;justify-content:center;
}
.cols-3 .cell-btn-minus:active{background:rgba(239,68,68,.12);color:var(--red);}

/* ── BOTTOM BAR ── */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
  padding:10px 14px env(safe-area-inset-bottom,10px);
  height:calc(var(--bar-h) + env(safe-area-inset-bottom,0px));
}
.bar-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:8px 6px;border-radius:10px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;touch-action:manipulation;
  font-family:var(--sans);transition:all .15s;min-height:44px;
}
.bar-btn:active{background:var(--surface2);border-color:var(--accent);color:var(--accent);}
.bar-btn-icon{font-size:18px;line-height:1;}
.bar-btn-label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;font-family:var(--mono);}
.bar-btn.primary{
  background:linear-gradient(135deg,rgba(0,212,255,.12),rgba(124,58,237,.12));
  border-color:var(--accent);color:var(--accent);flex:1.5;
}
.bar-btn.primary:active{opacity:.7;}
.bar-btn.danger:active{border-color:var(--red);color:var(--red);}

/* ══════════════════════════════════════
   VOICE MODAL (slides up from bottom)
══════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  z-index:500;display:none;align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal-sheet{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px 20px 0 0;width:100%;max-width:600px;
  padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-pill{width:36px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 16px;}
.modal-title{font-family:var(--mono);font-size:11px;color:var(--accent);
  text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;}

/* voice input */
.voice-input-wrap{
  display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:2px solid var(--border);
  border-radius:12px;padding:10px 14px;margin-bottom:12px;
  transition:border-color .2s;
}
.voice-input-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.1);}
.voice-input-wrap.matched{border-color:var(--green);}
.voice-input-wrap.no-match{border-color:var(--red);}
.voice-input{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-size:18px;font-family:var(--sans);
  caret-color:var(--accent);
}
.voice-input::placeholder{color:var(--muted);font-size:14px;}
.voice-status{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap;}
.voice-status.ok{color:var(--green);}
.voice-status.err{color:var(--red);}
.voice-clear{background:transparent;border:none;color:var(--muted);
  font-size:20px;cursor:pointer;padding:2px 4px;line-height:1;}
.voice-clear:active{color:var(--red);}

.voice-hint{font-size:11px;color:var(--muted);line-height:1.7;margin-bottom:14px;}
.voice-hint strong{color:var(--text);}

/* chips */
.voice-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.vchip{
  background:var(--surface2);border:1px solid var(--border);border-radius:99px;
  padding:7px 14px;font-size:12px;font-family:var(--mono);color:var(--muted);
  cursor:pointer;touch-action:manipulation;transition:all .15s;
}
.vchip:active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.08);}

.voice-close{
  width:100%;padding:14px;border-radius:12px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-family:var(--sans);font-size:15px;cursor:pointer;
}
.voice-close:active{border-color:var(--muted);}

/* ══════════════════════════════════════
   REPORT MODAL
══════════════════════════════════════ */
.report-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.85);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  z-index:500;display:none;flex-direction:column;
  padding:env(safe-area-inset-top,0) 0 0;
}
.report-overlay.open{display:flex;}
.report-inner{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  background:var(--surface);padding:20px 16px;
}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.report-title{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:1px;}
.report-close-btn{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);border-radius:8px;padding:8px 16px;
  font-family:var(--sans);font-size:13px;cursor:pointer;
}
.report-close-btn:active{border-color:var(--accent);color:var(--accent);}

/* stats row */
.report-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.r-stat{background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:10px 12px;}
.r-stat-val{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent);}
.r-stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;}

/* report table */
.report-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px;}
.report-table th{text-align:left;padding:7px 8px;font-family:var(--mono);font-size:9px;
  text-transform:uppercase;letter-spacing:1px;color:var(--muted);
  border-bottom:1px solid var(--border);}
.report-table td{padding:8px 8px;border-bottom:1px solid var(--border);color:var(--text);}
.report-table td:nth-child(3),.report-table td:nth-child(4),.report-table td:nth-child(5){
  font-family:var(--mono);font-weight:700;font-size:13px;}
.report-table tr:last-child td{border-bottom:none;}
.cat-badge{
  display:inline-block;font-size:8px;padding:2px 6px;border-radius:99px;
  text-transform:uppercase;letter-spacing:.5px;font-family:var(--mono);
}
.cat-normal{background:rgba(16,185,129,.1);color:#10b981;}
.cat-geno{background:rgba(245,158,11,.1);color:#f59e0b;}
.cat-cyto{background:rgba(239,68,68,.1);color:#ef4444;}

.report-footer{
  background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:12px;font-size:10px;color:var(--muted);font-family:var(--mono);line-height:1.9;
  margin-bottom:16px;
}
.report-export-btn{
  width:100%;padding:16px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--green),#059669);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;
  font-family:var(--sans);margin-bottom:10px;
}
.report-export-btn:active{opacity:.8;}

/* ══════════════════════════════════════
   COMPLETION MODAL
══════════════════════════════════════ */
#doneModal.modal-overlay{align-items:center;justify-content:center;padding:20px;}
.done-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:28px 24px;width:100%;max-width:400px;
  text-align:center;
}
.done-emoji{font-size:52px;margin-bottom:12px;}
.done-title{font-family:var(--mono);font-size:16px;color:var(--accent);
  letter-spacing:1px;margin-bottom:6px;}
.done-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6;}
.done-actions{display:flex;flex-direction:column;gap:10px;}
.done-export{
  padding:16px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--green),#059669);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--sans);
}
.done-export:active{opacity:.8;}
.done-report{
  padding:14px;border-radius:12px;border:1px solid var(--border);
  background:transparent;color:var(--text);font-size:14px;cursor:pointer;font-family:var(--sans);
}
.done-report:active{border-color:var(--accent);color:var(--accent);}
.done-continue{
  padding:12px;border-radius:12px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:13px;cursor:pointer;font-family:var(--sans);
}
.done-continue:active{color:var(--text);}

/* ── TOAST ── */
.toast{
  position:fixed;top:max(16px, env(safe-area-inset-top));
  left:50%;transform:translateX(-50%) translateY(-8px);
  background:var(--surface2);border:1px solid var(--accent);
  color:var(--accent);padding:10px 18px;border-radius:10px;
  font-family:var(--mono);font-size:12px;z-index:1000;
  opacity:0;transition:all .25s;pointer-events:none;
  white-space:nowrap;max-width:90vw;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{border-color:var(--red);color:var(--red);}
.toast.success{border-color:var(--green);color:var(--green);}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
</style>
</head>
<body>

<!-- ══════════════════════
     SCREEN 1 · SETUP
══════════════════════ -->
<div id="scSetup" class="screen active">
  <div id="setupScroll" style="flex:1;overflow-y:auto;display:flex;align-items:center;justify-content:center;padding:24px 20px;">
  <div class="setup-card">
    <div class="setup-logo">
      <div class="setup-logo-icon">🔬</div>
      <div class="setup-logo-text">
        <h1>BMCyt Counter</h1>
        <p>HUMNxl · Bolognesi 2013</p>
      </div>
      <div class="lang-toggle">
        <button class="lang-btn active" id="btnES" onclick="setLang('es')">ES</button>
        <button class="lang-btn"        id="btnEN" onclick="setLang('en')">EN</button>
      </div>
    </div>

    <!-- resume banner (shown if saved session exists) -->
    <div id="resumeBanner" class="resume-banner" style="display:none">
      <strong id="resumeTitle">↩ Sesión guardada encontrada</strong>
      <span id="resumeInfo"></span>
    </div>

    <div class="form-group">
      <label class="form-label" for="inpParticipant" id="lbl-pid">ID del Participante <span>*</span></label>
      <input type="text" id="inpParticipant" class="form-input"

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let lang = 'es';
let state = {
  participantId: '',
  sampleNumber: '',
  startTime: null,
  cells: {},
  history: [],
  goalShown: false,
};
CELL_DEFS.forEach(d => state.cells[d.key] = 0);

// ═══════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════
function saveState() {
  try { localStorage.setItem('bmcyt_v7', JSON.stringify({lang, state})); } catch(e){}
}
function loadSaved() {
  try {
    const raw = localStorage.getItem('bmcyt_v7');
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e){ return null; }
}
function clearSaved() {
  try { localStorage.removeItem('bmcyt_v7'); } catch(e){}
}

// ═══════════════════════════════════════
// UTILITY
// ═══════════════════════════════════════
function g(id){ return document.getElementById(id); }
function getTotal(){ return Object.values(state.cells).reduce((s,v)=>s+v,0); }
function vibrate(ms){ try{ navigator.vibrate && navigator.vibrate(ms||25); }catch(e){} }
function norm(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }

// ═══════════════════════════════════════
// SCREEN MANAGEMENT
// ═══════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  g(id).classList.add('active');
}

// ═══════════════════════════════════════
// LANGUAGE
// ═══════════════════════════════════════
function setLang(l) {
  lang = l;
  g('btnES').className = 'lang-btn' + (l==='es'?' active':'');
  g('btnEN').className = 'lang-btn' + (l==='en'?' active':'');
  renderSetupLabels();
  if (g('scCounter').classList.contains('active')) {
    renderCounter();
    updateProgress();
    renderVoiceChips();
    updateCounterLabels();
  }
  saveState();
}

function renderSetupLabels() {
  const u = UI[lang];
  g('lbl-pid').innerHTML = u.pid + ' <span style="color:var(--red)">*</span>';
  g('lbl-sample').textContent = u.sample;
  const saved = loadSaved();
  renderSetupActions(saved);
  if (saved) renderResumeBanner(saved);
}

// ═══════════════════════════════════════
// SETUP SCREEN
// ═══════════════════════════════════════
function renderSetupActions(saved) {
  const u = UI[lang];
  const actions = g('setupActions');
  if (saved && getCountFromSaved(saved) > 0) {
    actions.innerHTML = `
      <button class="btn-resume" onclick="resumeSession()">${u.resumeSession}</button>
      <button class="btn-start"  onclick="startNewSession()">${u.startNew}</button>`;
  } else {
    actions.innerHTML = `<button class="btn-start" onclick="startNewSession()">${u.startNew}</button>`;
  }
}

function getCountFromSaved(saved) {
  if (!saved || !saved.state || !saved.state.cells) return 0;
  return Object.values(saved.state.cells).reduce((s,v)=>s+v,0);
}

function renderResumeBanner(saved) {
  const banner = g('resumeBanner');
  const info = g('resumeInfo');
  const u = UI[lang];
  const total = getCountFromSaved(saved);
  const s = saved.state;
  if (total > 0) {
    g('resumeTitle').textContent = u.resumeTitle;
    const pct = (total/GOAL*100).toFixed(1);
    info.textContent = `${s.participantId || '—'} · Muestra ${s.sampleNumber || '—'} · ${total}/${GOAL} (${pct}%)`;
    banner.style.display = 'block';
  } else {
    banner.style.display = 'none';
  }
}

function startNewSession() {
  const pid = g('inpParticipant').value.trim();
  if (!pid) {
    g('inpParticipant').focus();
    g('inpParticipant').style.borderColor = 'var(--red)';
    setTimeout(() => g('inpParticipant').style.borderColor = '', 1500);
    showToast(lang==='es'?'Ingresa el ID del participante':'Enter participant ID','error');
    return;
  }
  clearSaved();
  CELL_DEFS.forEach(d => state.cells[d.key] = 0);
  state.history = [];
  state.goalShown = false;
  state.participantId = pid;
  state.sampleNumber = g('inpSample').value.trim();
  state.startTime = new Date().toISOString();
  saveState();
  launchCounter();
}

function resumeSession() {
  const saved = loadSaved();
  if (!saved) return;
  lang = saved.lang || 'es';
  state = saved.state;
  // ensure all cell keys exist
  CELL_DEFS.forEach(d => { if(state.cells[d.key]==null) state.cells[d.key]=0; });
  if (!state.history) state.history = [];
  g('inpParticipant').value = state.participantId || '';
  g('inpSample').value = state.sampleNumber || '';
  launchCounter();
}

function launchCounter() {
  showScreen('scCounter');
  renderCounter();
  updateProgress();
  updateCounterLabels();
  renderVoiceChips();
  g('topParticipant').textContent = state.participantId + (state.sampleNumber ? ' · M'+state.sampleNumber : '');
}

function openEditParticipant() {
  showScreen('scSetup');
  const saved = loadSaved();
  g('inpParticipant').value = state.participantId;
  g('inpSample').value = state.sampleNumber;
  renderSetupLabels();
  if (saved && getCountFromSaved(saved) > 0) {
    g('setupActions').innerHTML = `
      <button class="btn-resume" onclick="applyEditParticipant()">${lang==='es'?'Actualizar y volver':'Update and go back'}</button>
      <button class="btn-new" onclick="confirmFullReset()">${UI[lang].newSession}</button>`;
  }
}

function applyEditParticipant() {
  const pid = g('inpParticipant').value.trim();
  if (!pid) { g('inpParticipant').focus(); return; }
  state.participantId = pid;
  state.sampleNumber = g('inpSample').value.trim();
  saveState();
  launchCounter();
}

function confirmFullReset() {
  if (confirm(UI[lang].confirmReset)) {
    clearSaved();
    CELL_DEFS.forEach(d => state.cells[d.key] = 0);
    state.history = []; state.goalShown = false;
    state.participantId = ''; state.sampleNumber = '';
    g('inpParticipant').value = ''; g('inpSample').value = '';
    renderSetupLabels();
    showToast(UI[lang].notifReset);
  }
}

// ═══════════════════════════════════════
// RENDER COUNTER
// ═══════════════════════════════════════
function renderCounter() {
  const scroll = g('cellsScroll');
  scroll.innerHTML = SECTIONS.map(sec => {
    const sLabel = sec.lbl[lang] || sec.lbl.es;
    const grid = sec.keys.map(key => {
      const d = CELL_DEFS.find(x => x.key===key);
      const label = lang==='es' ? d.labelEs : d.labelEn;
      const tag   = lang==='es' ? d.tagEs   : d.tagEn;
      return `
      <div class="cell-btn" style="--cc:${d.color}" data-key="${key}" ontouchstart="" onclick="addCellBtn(event,'${key}')">
        <div class="cell-btn-body">
          <div class="cell-btn-name">${label}</div>
          <div class="cell-btn-tag">${tag}</div>
          <div class="cell-btn-count" id="cnt-${key}">${state.cells[key]}</div>
        </div>
        <button class="cell-btn-minus" onclick="removeCellBtn(event,'${key}')">−</button>
      </div>`;
    }).join('');
    return `
    <div class="section-lbl" style="--section-color:${sec.color}">
      <div class="section-dot"></div>${sLabel}
    </div>
    <div class="cell-grid cols-${sec.cols}">${grid}</div>`;
  }).join('');
}

function updateCounterLabels() {
  const u = UI[lang];
  g('lbl-topRemain').textContent = u.topRemain;
  g('lbl-undo').textContent  = u.undoBtn;
  g('lbl-voice').textContent = u.voiceBtn;
  g('lbl-report').textContent= u.reportBtn;
  g('lbl-reset').textContent = u.resetBtn;
  g('lbl-voice').textContent = u.voiceBtn;
}

// ═══════════════════════════════════════
// COUNTER CORE
// ═══════════════════════════════════════
function addCellBtn(event, key) {
  addCell(key);
}
function removeCellBtn(event, key) {
  event.stopPropagation();
  removeCell(key);
}

let _tapLock = {};
function addCell(key) {
  if (_tapLock[key]) return;
  _tapLock[key] = true;
  setTimeout(() => delete _tapLock[key], 120);

  const total = getTotal();
  if (total >= GOAL) {
    showToast(UI[lang].notifGoal, 'success');
    return;
  }
  state.cells[key]++;
  state.history.push({key, a:'add'});
  vibrate(22);
  refreshCount(key);
  updateProgress();
  flashCard(key);
  saveState();
  checkGoal();
}

function removeCell(key) {
  if (state.cells[key] > 0) {
    state.cells[key]--;
    state.history.push({key, a:'sub'});
    vibrate(15);
    refreshCount(key);
    updateProgress();
    saveState();
  }
}

function undoLast() {
  if (!state.history.length) {
    showToast(UI[lang].notifNoUndo, 'error');
    vibrate([10,50,10]);
    return;
  }
  const last = state.history.pop();
  if (last.a==='add') state.cells[last.key] = Math.max(0, state.cells[last.key]-1);
  else state.cells[last.key]++;
  vibrate(30);
  refreshCount(last.key);
  updateProgress();
  saveState();
  const def = CELL_DEFS.find(d=>d.key===last.key);
  const label = lang==='es' ? def.labelEs : def.labelEn;
  showToast(UI[lang].notifUndo + label);
}

function confirmReset() {
  if (confirm(UI[lang].confirmReset)) {
    CELL_DEFS.forEach(d => state.cells[d.key]=0);
    state.history = [];
    state.goalShown = false;
    renderCounter();
    updateProgress();
    saveState();
    showToast(UI[lang].notifReset);
  }
}

function checkGoal() {
  if (getTotal()===GOAL && !state.goalShown) {
    state.goalShown = true;
    setTimeout(() => openDone(), 400);
  }
}

// ═══════════════════════════════════════
// PROGRESS & UI UPDATE
// ═══════════════════════════════════════
function refreshCount(key) {
  const el = g('cnt-'+key);
  if (el) el.textContent = state.cells[key];
}

function updateProgress() {
  const total = getTotal();
  const pct = Math.min(100, total/GOAL*100);
  const remain = Math.max(0, GOAL-total);
  g('topTotal').textContent   = total;
  g('topRemain').textContent  = remain;
  g('progressFill').style.width = pct+'%';
  [500,1000,1500,2000].forEach((m,i,arr)=>{
    const el = g('ms'+m);
    if (!el) return;
    if (total>=m) el.className='ms reached';
    else if (total>=(arr[i-1]||0)) el.className='ms active';
    else el.className='ms';
  });
}

function flashCard(key) {
  const card = document.querySelector(`[data-key="${key}"]`);
  if (!card) return;
  card.classList.add('flash');
  setTimeout(() => card.classList.remove('flash'), 240);
}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
function showToast(msg, type='') {
  const t = g('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type?' '+type:'');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className='toast', 2600);
}

// ═══════════════════════════════════════
// VOICE MODAL
// ═══════════════════════════════════════
let voiceTimer = null, voiceCooldown = false;

function openVoice() {
  const u = UI[lang];
  g('voiceTitle').textContent = u.voiceTitle;
  g('voiceHint').innerHTML    = u.voiceHint;
  g('lbl-voiceClose').textContent = u.voiceClose;
  g('voiceInput').placeholder = u.voicePlaceholder;
  g('voiceInput').value = '';
  g('voiceStatus').textContent = '—';
  g('voiceStatus').className = 'voice-status';
  g('voiceWrap').className = 'voice-input-wrap';
  g('voiceModal').classList.add('open');
  setTimeout(() => g('voiceInput').focus(), 300);
}

function closeVoice() {
  g('voiceModal').classList.remove('open');
  g('voiceInput').value = '';
}

function clearVoice() {
  clearTimeout(voiceTimer);
  voiceCooldown = false;
  g('voiceInput').value = '';
  g('voiceStatus').textContent = '—';
  g('voiceStatus').className = 'voice-status';
  g('voiceWrap').className = 'voice-input-wrap';
}

function renderVoiceChips() {
  const u = UI[lang];
  g('voiceChips').innerHTML =
    u.chips.map((label,i) =>
      `<span class="vchip" onclick="addCell('${CHIP_KEYS[i]}');closeVoice()">${label}</span>`
    ).join('');
}

g('voiceInput').addEventListener('input', () => {
  if (voiceCooldown) { g('voiceInput').value=''; return; }
  clearTimeout(voiceTimer);
  const text = g('voiceInput').value.trim();
  if (!text) return;
  voiceTimer = setTimeout(() => triggerVoice(), 650);
});

g('voiceInput').addEventListener('keydown', e => {
  if (e.key==='Enter') { clearTimeout(voiceTimer); triggerVoice(); e.preventDefault(); }
});

function triggerVoice() {
  const text = g('voiceInput').value.trim();
  if (!text) return;
  processVoice(text);
  voiceCooldown = true;
  g('voiceInput').value = '';
  setTimeout(() => { voiceCooldown=false; }, 400);
}

function matchWord(word, map) {
  for (const entry of map) {
    for (const trigger of entry.w) {
      const t = norm(trigger);
      if (word===t) return entry.k;
      if (word.startsWith(t) && t.length>=3) return entry.k;
      if (t.startsWith(word) && word.length>=3) return entry.k;
    }
  }
  return null;
}

function processVoice(text) {
  const u = UI[lang];
  const pMap = lang==='es' ? CMD_ES : CMD_EN;
  const fMap = lang==='es' ? CMD_EN : CMD_ES;
  const words = norm(text).split(/[\s,;.:!?()\-]+/).filter(Boolean);

  if (words.some(w => u.undoWords.includes(w))) {
    undoLast(); setVoiceFeedback('↩','ok'); return;
  }

  let count=0, lastLabel='';
  for (const word of words) {
    const matched = matchWord(word,pMap) || matchWord(word,fMap);
    if (matched) {
      addCell(matched); count++;
      const def = CELL_DEFS.find(d=>d.key===matched);
      lastLabel = lang==='es' ? def.labelEs : def.labelEn;
    }
  }
  if (count===1) setVoiceFeedback(u.feedbackOk+lastLabel, 'ok');
  else if (count>1) setVoiceFeedback('✓ '+count+u.feedbackMulti, 'ok');
  else setVoiceFeedback(u.feedbackErr+'"'+text+'"', 'err');
}

function setVoiceFeedback(msg, type) {
  const st = g('voiceStatus');
  const wr = g('voiceWrap');
  st.textContent = msg;
  st.className   = 'voice-status ' + (type||'');
  wr.className   = 'voice-input-wrap ' + (type==='ok'?'matched':type==='err'?'no-match':'');
  clearTimeout(wr._t);
  wr._t = setTimeout(() => {
    wr.className = 'voice-input-wrap';
    st.textContent='—'; st.className='voice-status';
  }, 2000);
}

// close voice modal on overlay tap
g('voiceModal').addEventListener('click', e => { if(e.target===g('voiceModal')) closeVoice(); });

// ═══════════════════════════════════════
// REPORT MODAL
// ═══════════════════════════════════════
function openReport() {
  const u = UI[lang];
  const total = getTotal();
  g('reportTitle').textContent = u.reportTitle;
  g('lbl-reportClose').textContent = u.reportClose;
  g('th-cat').textContent   = u.thCat;
  g('th-type').textContent  = u.thType;
  g('th-count').textContent = u.thCount;
  g('th-per').textContent   = u.thPer;
  g('lbl-exportBtn').textContent = u.exportBtn;

  // stats
  const diff = state.cells.diferenciada+state.cells.micronucleo+state.cells.nbud+state.cells.binucleada;
  const mnF  = diff>0 ? (state.cells.micronucleo/diff*1000).toFixed(2) : 'N/A';
  const nF   = diff>0 ? (state.cells.nbud/diff*1000).toFixed(2) : 'N/A';
  const death= state.cells.cromatina+state.cells.cariorrexis+state.cells.picnosis+state.cells.cariolisis;
  g('reportStats').innerHTML = `
    <div class="r-stat"><div class="r-stat-val">${total}</div><div class="r-stat-lbl">${u.rTotal}</div></div>
    <div class="r-stat"><div class="r-stat-val">${total>0?(total/GOAL*100).toFixed(1)+'%':'0%'}</div><div class="r-stat-lbl">Avance</div></div>
    <div class="r-stat"><div class="r-stat-val">${mnF}</div><div class="r-stat-lbl">${u.rMNF}/1000</div></div>
    <div class="r-stat"><div class="r-stat-val">${nF}</div><div class="r-stat-lbl">${u.rNBUDF}/1000</div></div>`;

  // table
  g('reportBody').innerHTML = CELL_DEFS.map(d => {
    const label = lang==='es' ? d.labelEs : d.labelEn;
    const cat   = lang==='es' ? d.catEs   : d.catEn;
    const pct   = total>0 ? (state.cells[d.key]/total*100).toFixed(2) : '0.00';
    const p1k   = total>0 ? (state.cells[d.key]/total*1000).toFixed(2) : '0.00';
    return `<tr>
      <td><span class="cat-badge ${d.catClass}">${cat}</span></td>
      <td>${label}</td>
      <td>${state.cells[d.key]}</td>
      <td>${pct}%</td>
      <td>${p1k}</td>
    </tr>`;
  }).join('');

  g('reportFooter').innerHTML =
    `${u.rTotal}: ${total}/${GOAL} | ${u.rMNF}: ${mnF}/1000 | ${u.rNBUDF}: ${nF}/1000<br>`+
    `${u.rDeath}: ${death} | ${u.rDate}: ${new Date().toLocaleString(lang==='es'?'es-MX':'en-US')}<br>`+
    `${u.rProto}: BMCyt HUMNxl — Bolognesi et al. 2013 · Thomas et al. 2009`;

  g('reportModal').classList.add('open');
}

function closeReport() { g('reportModal').classList.remove('open'); }

// ═══════════════════════════════════════
// DONE MODAL
// ═══════════════════════════════════════
function openDone() {
  const u = UI[lang];
  g('doneTitle').textContent   = u.doneTitle;
  g('doneSub').innerHTML       = u.doneSub;
  g('lbl-doneExport').textContent   = u.doneExport;
  g('lbl-doneReport').textContent   = u.doneReport;
  g('lbl-doneContinue').textContent = u.doneContinue;
  g('doneModal').classList.add('open');
}
function closeDone() { g('doneModal').classList.remove('open'); }

// ═══════════════════════════════════════
// CSV EXPORT
// ═══════════════════════════════════════
function exportCSV() {
  const total = getTotal();
  const now   = new Date();
  let csv = '#BMCyt_SESSION_v7\n';
  csv += `#Participant,${state.participantId}\n`;
  csv += `#Sample,${state.sampleNumber||''}\n`;
  csv += `#Date,${now.toISOString()}\n`;
  csv += `#Protocol,HUMNxl Bolognesi 2013\n`;
  csv += `#Goal,${GOAL}\n#Lang,${lang}\n\n`;
  csv += 'key,label_es,label_en,category_es,category_en,count,pct,per_1000\n';

  const diff = state.cells.diferenciada+state.cells.micronucleo+state.cells.nbud+state.cells.binucleada;
  CELL_DEFS.forEach(d => {
    const pct = total>0 ? (state.cells[d.key]/total*100).toFixed(2) : '0.00';
    const p1k = total>0 ? (state.cells[d.key]/total*1000).toFixed(2) : '0.00';
    csv += `${d.key},${d.labelEs},${d.labelEn},${d.catEs},${d.catEn},${state.cells[d.key]},${pct},${p1k}\n`;
  });
  const mnF = diff>0?(state.cells.micronucleo/diff*1000).toFixed(2):'N/A';
  const nF  = diff>0?(state.cells.nbud/diff*1000).toFixed(2):'N/A';
  csv += `\n#TOTAL,${total},,,,${total},,\n`;
  csv += `#MN_FREQ_PER_1000,${mnF}\n#NBUD_FREQ_PER_1000,${nF}\n`;

  const ds = now.toISOString().replace(/[:.]/g,'-').slice(0,16);
  const pid = state.participantId.replace(/[^a-zA-Z0-9_-]/g,'_');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download = `BMCyt_${pid}_${ds}.csv`;
  a.click();
  showToast(UI[lang].notifExport, 'success');
}

// ═══════════════════════════════════════
// KEYBOARD SHORTCUTS (desktop / BT keyboards)
// ═══════════════════════════════════════
const KEY_MAP={n:'diferenciada',b:'basal',m:'micronucleo',g:'nbud',
               i:'binucleada',c:'cromatina',r:'cariorrexis',p:'picnosis',l:'cariolisis'};

document.addEventListener('keydown', e => {
  if (!g('scCounter').classList.contains('active')) return;
  if (e.target===g('voiceInput')) return;
  if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if (e.ctrlKey||e.metaKey||e.altKey) return;
  const k = e.key.toLowerCase();
  if (KEY_MAP[k]){ addCell(KEY_MAP[k]); return; }
  if (k==='z') undoLast();
});

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
function init() {
  const saved = loadSaved();
  if (saved) {
    lang = saved.lang || 'es';
    g('btnES').className = 'lang-btn' + (lang==='es'?' active':'');
    g('btnEN').className = 'lang-btn' + (lang==='en'?' active':'');
    if (saved.state) {
      g('inpParticipant').value = saved.state.participantId || '';
      g('inpSample').value = saved.state.sampleNumber || '';
    }
    renderResumeBanner(saved);
  }
  renderSetupLabels();
}

init();
</script>
